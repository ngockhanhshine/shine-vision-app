<!DOCTYPE html>
<html lang="vi">
<head>
    <script src="../auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anaglyph Reading Pro - Shine Vision</title>
    <script src="readme.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            padding: 20px; 
            background-color: #e0e0e0;
            color: #333;
            margin: 0;
            user-select: none; /* Chặn bôi đen nội dung */
        }

        #main-app-content { display: none; }

        #pause-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .container { 
            max-width: 1000px; margin: auto; background: white; 
            padding: 25px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        
        .control-panel { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 15px; background: #f9f9f9; padding: 15px; 
            border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd;
        }

        .rgb-controls { 
            display: flex; flex-direction: column; gap: 10px; 
            padding: 12px; border-radius: 6px; background: #fff; border: 1px solid #eee;
        }
        
        .slider-group { display: flex; align-items: center; gap: 8px; font-size: 13px; font-family: monospace; }
        .slider-group input { flex: 1; }
        .slider-group span { width: 30px; text-align: right; }

        .color-preview { width: 100%; height: 40px; border-radius: 4px; margin-top: 5px; border: 1px solid #ccc; }

        #reading-content { 
            font-size: 28px; font-weight: 700; line-height: 1.8; 
            white-space: pre-wrap; padding: 40px; border: 2px solid #ccc; 
            border-radius: 10px; background-color: rgb(245, 245, 245); 
            min-height: 400px; margin-bottom: 20px; text-align: justify;
        }

        :root { --red-final: rgb(255,0,0); --blue-final: rgb(0,0,255); }
        .color-1 { color: var(--red-final); }
        .color-2 { color: var(--blue-final); }
        .color-3 { color: #000000; }

        select, textarea { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { background: #2c3e50; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        label { font-weight: bold; margin-bottom: 5px; display: block; }

        #readme-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); color: white; z-index: 9999;
            display: none; padding: 40px; box-sizing: border-box; overflow-y: auto;
        }
        #readme-inner { 
            max-width: 800px; margin: 0 auto; line-height: 1.6; font-size: 16px; 
            background: #fff; color: #333; padding: 30px; border-radius: 12px; position: relative;
        }
        #close-btn { position: absolute; top: 10px; right: 20px; font-size: 30px; color: #333; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="pause-overlay" style="display: none;">
    <h1>ỨNG DỤNG ĐANG TẠM DỪNG</h1>
    <p>Vui lòng di chuyển chuột vào trong màn hình để tiếp tục luyện tập.</p>
</div>

<div id="main-app-content">
    <div class="container">
        <h2 style="margin-top:0">Anaglyph Reading Pro</h2>
        
        <div style="margin-bottom: 20px;">
            <label>📖 Chọn bài tập:</label>
            <select id="story-select" onchange="loadFixedStory()"></select>
        </div>

        <div class="control-panel">
            <div class="rgb-controls" style="border-top: 4px solid #ff4444;">
                <strong>🔴 Kính Trái (Đỏ)</strong>
                <div class="slider-group">R: <input type="range" id="r1" min="0" max="255" value="255" oninput="updateRGB()"> <span id="v-r1">255</span></div>
                <div class="slider-group">G: <input type="range" id="g1" min="0" max="255" value="0" oninput="updateRGB()"> <span id="v-g1">0</span></div>
                <div class="slider-group">B: <input type="range" id="b1" min="0" max="255" value="0" oninput="updateRGB()"> <span id="v-b1">0</span></div>
                <div id="preview1" class="color-preview"></div>
            </div>

            <div class="rgb-controls" style="border-top: 4px solid #4444ff;">
                <strong>🔵 Kính Phải (Xanh)</strong>
                <div class="slider-group">R: <input type="range" id="r2" min="0" max="255" value="0" oninput="updateRGB()"> <span id="v-r2">0</span></div>
                <div class="slider-group">G: <input type="range" id="g2" min="0" max="255" value="255" oninput="updateRGB()"> <span id="v-g2">255</span></div>
                <div class="slider-group">B: <input type="range" id="b2" min="0" max="255" value="255" oninput="updateRGB()"> <span id="v-b2">255</span></div>
                <div id="preview2" class="color-preview"></div>
            </div>
        </div>

        <div id="reading-content">Hãy chọn bài đọc để bắt đầu tập luyện...</div>

        <div style="border-top: 1px solid #eee; padding-top: 15px;">
            <label>⚡ Dán văn bản nhanh:</label>
            <textarea id="quick-input" rows="2" placeholder="Dán nội dung vào đây..."></textarea>
            <button onclick="loadFromInput()">Chuyển đổi Anaglyph</button>
        </div>
    </div>

    <div id="readme-overlay" onclick="closeReadme()">
        <div id="readme-inner" onclick="event.stopPropagation()">
            <span id="close-btn" onclick="closeReadme()">&times;</span>
            <div id="readme-content">Đang tải hướng dẫn...</div>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script>
    // --- BẢO MẬT CONSOLE ---
    (function() {
        const check = function() {
            const threshold = 160;
            const widthThreshold = window.outerWidth - window.innerWidth > threshold;
            const heightThreshold = window.outerHeight - window.innerHeight > threshold;
            const devtools = { open: false };
            const element = new Image();
            Object.defineProperty(element, 'id', {
                get: function() {
                    devtools.open = true;
                    terminateSession();
                }
            });
            function terminateSession() {
                localStorage.removeItem('user_login');
                window.location.replace("about:blank");
                document.body.innerHTML = "";
            }
            console.log(element);
            console.clear();
            if (widthThreshold || heightThreshold || devtools.open) {
                terminateSession();
            }
        };
        setInterval(function() {
            const start = performance.now();
            debugger;
            if (performance.now() - start > 50) {
                window.location.replace("about:blank");
            }
        }, 100);
        setInterval(check, 100);
        window.addEventListener('resize', check);
    })();

    // Chạy kiểm tra liên tục mỗi 200ms
    setInterval(detectConsole, 200);

    // Chống mở Console qua phím tắt
    window.addEventListener('keydown', (e) => {
        const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
        const isForbidden = 
            e.key === 'F12' || 
            ((e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === 's' || e.key.toLowerCase() === 'u')) ||
            ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key.toLowerCase() === 'i' || e.key.toLowerCase() === 'j' || e.key.toLowerCase() === 'c')) ||
            (isMac && e.metaKey && e.altKey && (e.key.toLowerCase() === 'i' || e.key.toLowerCase() === 'j'));

        if (isForbidden) {
            e.preventDefault();
            e.stopPropagation();
            showReadme();
            return false;
        }
    }, true);

    // Chặn chuột phải (đã có ở body nhưng thêm vào đây cho chắc chắn)
    document.addEventListener('contextmenu', e => e.preventDefault());

    /**
     * KIỂM TRA ĐĂNG NHẬP
     */
    (function() {
        const loginData = localStorage.getItem('user_login');
        if (!loginData) {
            window.location.replace('../index.html');
        } else {
            document.getElementById('main-app-content').style.display = 'block';
        }
    })();

    /**
     * TẠM DỪNG KHI RỜI CHUỘT (CHỐNG SAVE PAGE AS)
     */
    const appContent = document.getElementById('main-app-content');
    const pauseOverlay = document.getElementById('pause-overlay');

    document.addEventListener('mouseleave', () => {
        appContent.style.display = 'none'; // Xoá khỏi DOM hiển thị để không tải được
        pauseOverlay.style.display = 'flex';
    });

    document.addEventListener('mouseenter', () => {
        appContent.style.display = 'block';
        pauseOverlay.style.display = 'none';
    });

    /**
     * LOGIC ỨNG DỤNG (GIỮ NGUYÊN)
     */
    const contentDiv = document.getElementById('reading-content');
    const storySelect = document.getElementById('story-select');

    function init() {
        if (typeof stories !== 'undefined') {
            storySelect.innerHTML = '<option value="">-- Chọn bài đọc --</option>';
            stories.forEach((s, index) => {
                storySelect.add(new Option(s.title, index));
            });
        }
        const saved = JSON.parse(localStorage.getItem('ana-reading-rgb'));
        if(saved) {
            ['r1','g1','b1','r2','g2','b2'].forEach(id => {
                if(document.getElementById(id)) document.getElementById(id).value = saved[id];
            });
        }
        updateRGB();
    }

    function updateRGB() {
        const s = {};
        ['r1','g1','b1','r2','g2','b2'].forEach(id => {
            const el = document.getElementById(id);
            if(!el) return;
            s[id] = el.value;
            document.getElementById('v-' + id).innerText = s[id];
        });
        const c1 = `rgb(${s.r1},${s.g1},${s.b1})`;
        const c2 = `rgb(${s.r2},${s.g2},${s.b2})`;
        document.documentElement.style.setProperty('--red-final', c1);
        document.documentElement.style.setProperty('--blue-final', c2);
        document.getElementById('preview1').style.backgroundColor = c1;
        document.getElementById('preview2').style.backgroundColor = c2;
        localStorage.setItem('ana-reading-rgb', JSON.stringify(s));
    }

    function processText(text) {
        return text.split(/\s+/).map((word, i) => `<span class="color-${(i % 3) + 1}">${word}</span>`).join(' ');
    }

    function loadFixedStory() {
        const i = storySelect.value;
        if(i !== "") contentDiv.innerHTML = processText(stories[i].content);
    }

    function loadFromInput() {
        const t = document.getElementById('quick-input').value;
        if(t.trim()) { storySelect.value = ""; contentDiv.innerHTML = processText(t); }
    }

    function showReadme() {
        const overlay = document.getElementById('readme-overlay');
        const content = document.getElementById('readme-content');
        if (typeof README_CONTENT !== 'undefined') {
            content.innerHTML = README_CONTENT;
        } else {
            content.innerText = "Không tìm thấy nội dung hướng dẫn.";
        }
        overlay.style.display = 'block';
    }

    function closeReadme() {
        document.getElementById('readme-overlay').style.display = 'none';
    }

    init();
</script>
</body>
</html>
