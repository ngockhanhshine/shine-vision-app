<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anaglyph Brockstring - Final Pro Max</title>
    <style>
        /* GIỮ NGUYÊN CSS GỐC CỦA ANH */
        body { margin: 0; padding: 0; display: flex; height: 100vh; background-color: rgb(242, 242, 242); font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; touch-action: none; }
        #appContainer { display: flex; width: 100%; height: 100%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #canvasContainer { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; position: relative; }
        canvas { background-color: rgb(242, 242, 242); box-shadow: 0 0 20px rgba(0,0,0,0.05); border-radius: 4px; cursor: pointer; max-width: 100%; max-height: 100%; }
        #controlsPanel { width: 320px; min-width: 320px; background-color: #ffffff; border-left: 1px solid #ddd; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; z-index: 100; }
        @media (max-width: 768px) { #canvasContainer { min-width: 100vw; } #appContainer.config-open { transform: translateX(-320px); } }
        @media (min-width: 769px) { #appContainer { transform: none !important; } }
        h2 { font-size: 1rem; margin: 0; color: #222; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        h3 { font-size: 0.85rem; margin: 10px 0 5px 0; color: #333; text-transform: uppercase; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; }
        label { font-size: 0.8rem; font-weight: bold; color: #555; }
        .val-text { font-family: monospace; font-size: 0.8rem; color: #888; }
        input[type=range] { width: 100%; cursor: pointer; height: 30px; touch-action: pan-x; }
        input[type=number] { width: 50px; padding: 5px; border: 1px solid #ccc; border-radius: 3px; font-size: 14px; }
        .preview-box { width: 100%; height: 15px; border-radius: 3px; border: 1px solid #eee; }
        .auto-box { background: #f9f9f9; padding: 10px; border-radius: 5px; border: 1px dashed #bbb; }
        .status-tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; background: #eee; color: #666; }
        .status-active { background: #e8f5e9; color: #2e7d32; font-weight: bold; }
        #logContainer { background: #fff; border: 1px solid #eee; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 0.8rem; min-height: 400px; max-height: 1250px; overflow-y: auto; color: #444; line-height: 1.8; box-shadow: inset 0 0 5px rgba(0,0,0,0.02); }
        .log-entry { border-bottom: 1px solid #f0f0f0; padding: 8px 0; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .rec-indicator { position: absolute; top: 30px; left: 30px; display: none; align-items: center; gap: 8px; font-family: monospace; font-weight: bold; color: #ff0000; pointer-events: none; z-index: 10; }
        .dot { width: 12px; height: 12px; background-color: #ff0000; border-radius: 50%; animation: blink 1s infinite; }
        #guideOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; z-index: 2000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .guide-modal { background: #fff; color: #333; padding: 30px; border-radius: 12px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; position: relative; line-height: 1.6; }
        .close-guide { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #999; }

        /* MÀN HÌNH BẢO MẬT */
        #securityShield {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; color: #777; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; cursor: pointer; text-align: center;
        }
        #securityShield h2 { color: #fff; border: none; margin-bottom: 10px; }
        .btn-start { border: 1px solid #444; padding: 10px 20px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="securityShield">
    <div id="shieldContent">
        <h2>SESSION PROTECTED</h2>
        <div class="btn-start">Rê chuột vào đây để mở ứng dụng</div>
    </div>
</div>

<div id="mainAppWrapper"></div>

<script src="readme.js"></script>
<script>
(function() {
    "use strict";

    const shield = document.getElementById('securityShield');
    const wrapper = document.getElementById('mainAppWrapper');
    
    // --- BẢO MẬT TẢI XUỐNG ---
    const isLocal = window.location.protocol === 'file:';
    const isWrongDomain = window.location.hostname !== 'localhost' && 
                          window.location.hostname !== 'shinevisionapp.com'; // Thay domain của anh vào đây

    if (isLocal || isWrongDomain) {
        document.getElementById('shieldContent').innerHTML = `
            <h2 style="color:#ff4444">SECURITY ERROR</h2>
            <p>Ứng dụng không thể chạy trực tiếp từ file tải xuống hoặc sai tên miền.<br>Vui lòng truy cập website chính thức.</p>
        `;
        return; // Khóa chết code tại đây
    }

    // --- BIẾN CHỨA TOÀN BỘ HTML GỐC CỦA ANH ---
    const rawHTML = `
        <div id="guideOverlay"><div class="guide-modal"><span class="close-guide" id="closeGuide">&times;</span><div id="guideContent">Đang tải...</div></div></div>
        <div id="appContainer">
            <div id="canvasContainer"><div id="recOverlay" class="rec-indicator"><div class="dot"></div><span>REC</span></div><canvas id="brockCanvas"></canvas></div>
            <div id="controlsPanel">
                <div class="label-row"><h2>Cấu Hình</h2><span id="moveStatus" class="status-tag">ĐANG DỪNG</span></div>
                <div class="control-group"><div class="label-row"><label>Vị trí & Góc</label><span id="angleInfo" class="val-text">--°</span></div><input type="range" id="ySlider" min="0" max="100" step="0.1" value="50"></div>
                <div class="auto-box"><label style="font-weight:bold; font-size:0.8rem;">Auto-Move</label><div class="label-row"><span>Từ: <input type="number" id="posMin" value="10">%</span><span>Đến: <input type="number" id="posMax" value="50">%</span></div><div class="label-row"><span>Chu kỳ: <input type="number" id="cycleTime" step="0.1" value="4">s</span></div></div>
                <div class="control-group"><label>Dấu sắc (Mắt phải)</label><input type="range" id="rL" min="0" max="255" value="0"><input type="range" id="gL" min="0" max="255" value="255"><input type="range" id="bL" min="0" max="255" value="255"><div id="preL" class="preview-box"></div></div>
                <div class="control-group"><label>Dấu huyền (Mắt trái)</label><input type="range" id="rR" min="0" max="255" value="255"><input type="range" id="gR" min="0" max="255" value="69"><input type="range" id="bR" min="0" max="255" value="0"><div id="preR" class="preview-box"></div></div>
                <hr style="border:none; border-top:1px solid #eee; margin: 5px 0;"><h3>Nhật ký tập luyện</h3><div id="logContainer"></div>
            </div>
        </div>
    `;

    function initApp() {
        wrapper.innerHTML = rawHTML;
        shield.style.display = 'none';
        runOriginalLogic(); // Chạy lại logic của anh
    }

    function purgeApp() {
        wrapper.innerHTML = ""; // XÓA SẠCH DOM TRONG NHÁY MẮT
        shield.style.display = 'flex';
    }

    // Trigger bảo mật
    shield.addEventListener('mouseenter', initApp);
    window.addEventListener('blur', purgeApp); // Mất focus (đổi tab) là xóa sạch

    // --- GIỮ NGUYÊN 100% LOGIC GỐC CỦA ANH ---
    function runOriginalLogic() {
        const canvas = document.getElementById('brockCanvas');
        const ctx = canvas.getContext('2d');
        const appContainer = document.getElementById('appContainer');
        const ySlider = document.getElementById('ySlider');
        const angleInfo = document.getElementById('angleInfo');
        const moveStatus = document.getElementById('moveStatus');
        const logContainer = document.getElementById('logContainer');
        const recOverlay = document.getElementById('recOverlay');
        const guideOverlay = document.getElementById('guideOverlay');
        const guideContent = document.getElementById('guideContent');
        const closeGuide = document.getElementById('closeGuide');
        
        const posMinInp = document.getElementById('posMin');
        const posMaxInp = document.getElementById('posMax');
        const cycleInp = document.getElementById('cycleTime');

        const colors = {
            left: { r: document.getElementById('rL'), g: document.getElementById('gL'), b: document.getElementById('bL'), pre: document.getElementById('preL') },
            right: { r: document.getElementById('rR'), g: document.getElementById('gR'), b: document.getElementById('bR'), pre: document.getElementById('preR') }
        };

        let isAutoMoving = false;
        let currentYVal = 50;
        let touchStartX = 0;
        let sessionStartTime = 0; 
        let totalTrainingTimeToday = 0; 

        function showGuide() {
            if (typeof readmeContent !== 'undefined') guideContent.innerHTML = readmeContent;
            else guideContent.innerHTML = "<h2>Hướng dẫn</h2><p>Vui lòng kiểm tra file readme.js</p>";
            guideOverlay.style.display = 'flex';
        }

        closeGuide.onclick = () => guideOverlay.style.display = 'none';

        window.onkeydown = e => {
            if ((e.ctrlKey && e.key === 's') || e.key === 'F12') {
                e.preventDefault();
                showGuide();
            }
        };

        function getRGB(side) { return `rgb(${side.r.value}, ${side.g.value}, ${side.b.value})`; }
        function formatTime(ms) {
            let s = Math.floor(ms / 1000);
            return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(v => v < 10 ? "0"+v : v).join(":");
        }

        function saveLog() {
            let logs = JSON.parse(localStorage.getItem('brockLogs') || "{}");
            let key = new Date().toLocaleDateString('vi-VN').slice(0, 5);
            logs[key] = (logs[key] || 0) + totalTrainingTimeToday;
            localStorage.setItem('brockLogs', JSON.stringify(logs));
            totalTrainingTimeToday = 0;
            renderLog();
        }

        function renderLog() {
            let logs = JSON.parse(localStorage.getItem('brockLogs') || "{}");
            logContainer.innerHTML = "";
            Object.keys(logs).reverse().forEach(date => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.textContent = `${date} - Tổng: ${formatTime(logs[date])}`;
                logContainer.appendChild(div);
            });
        }

        function draw(timestamp) {
            if (!document.getElementById('brockCanvas')) return; // Quan trọng: dừng khi bị purge
            if (isAutoMoving) {
                const duration = parseFloat(cycleInp.value) || 4;
                const progress = (Math.sin((2 * Math.PI * timestamp / 1000 / duration) - Math.PI/2) + 1) / 2;
                const min = parseFloat(posMinInp.value);
                const max = parseFloat(posMaxInp.value);
                currentYVal = min + (max - min) * progress;
                ySlider.value = currentYVal.toFixed(1);
            } else {
                currentYVal = parseFloat(ySlider.value);
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cX = canvas.width / 2;
            const cY = canvas.height - (currentYVal / 100) * canvas.height;
            const angleDeg = 60 + (currentYVal / 100) * 20;
            angleInfo.textContent = `Góc: ${angleDeg.toFixed(1)}°`;
            
            const rad = (angleDeg * Math.PI) / 180;
            const dx = Math.cos(rad) * 2000, dy = Math.sin(rad) * 2000;

            ctx.lineWidth = 10; ctx.lineCap = "round";
            ctx.beginPath(); ctx.strokeStyle = getRGB(colors.left);
            ctx.moveTo(cX + dx, cY - dy); ctx.lineTo(cX - dx, cY + dy); ctx.stroke();

            ctx.beginPath(); ctx.strokeStyle = getRGB(colors.right);
            ctx.moveTo(cX - dx, cY - dy); ctx.lineTo(cX + dx, cY + dy); ctx.stroke();

            ctx.beginPath(); ctx.arc(cX, cY, 18, 0, Math.PI * 2); ctx.fillStyle = "black"; ctx.fill();

            colors.left.pre.style.backgroundColor = getRGB(colors.left);
            colors.right.pre.style.backgroundColor = getRGB(colors.right);

            requestAnimationFrame(draw);
        }

        function toggleAuto() {
            isAutoMoving = !isAutoMoving;
            if (isAutoMoving) {
                sessionStartTime = performance.now();
                moveStatus.textContent = "ĐANG CHẠY"; moveStatus.className = "status-tag status-active";
                recOverlay.style.display = "flex";
            } else {
                if (sessionStartTime > 0) {
                    totalTrainingTimeToday += (performance.now() - sessionStartTime);
                    sessionStartTime = 0;
                    saveLog();
                }
                moveStatus.textContent = "ĐANG DỪNG"; moveStatus.className = "status-tag";
                recOverlay.style.display = "none";
            }
        }

        canvas.onclick = () => { if (window.innerWidth > 768) toggleAuto(); };

        const resize = () => {
            canvas.width = document.getElementById('canvasContainer').clientWidth - 20;
            canvas.height = document.getElementById('canvasContainer').clientHeight - 20;
        };

        window.onresize = resize;
        resize(); renderLog(); requestAnimationFrame(draw);
    }

})();
</script>
</body>
</html>
