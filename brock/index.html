<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anaglyph Brockstring - Final Pro Max</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; height: 100vh;
            background-color: rgb(242, 242, 242);
            font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden;
            touch-action: none;
        }
        #appContainer { 
            display: flex; width: 100%; height: 100%; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #canvasContainer {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 10px; position: relative;
        }
        canvas {
            background-color: rgb(242, 242, 242);
            box-shadow: 0 0 20px rgba(0,0,0,0.05); border-radius: 4px;
            cursor: pointer; max-width: 100%; max-height: 100%;
        }
        #controlsPanel {
            width: 320px; min-width: 320px; background-color: #ffffff; 
            border-left: 1px solid #ddd; padding: 20px; box-sizing: border-box; 
            display: flex; flex-direction: column; gap: 12px; overflow-y: auto;
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            #canvasContainer { min-width: 100vw; }
            #appContainer.config-open { transform: translateX(-320px); }
        }

        @media (min-width: 769px) {
            #appContainer { transform: none !important; }
        }

        h2 { font-size: 1rem; margin: 0; color: #222; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        h3 { font-size: 0.85rem; margin: 10px 0 5px 0; color: #333; text-transform: uppercase; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; }
        label { font-size: 0.8rem; font-weight: bold; color: #555; }
        .val-text { font-family: monospace; font-size: 0.8rem; color: #888; }
        input[type=range] { width: 100%; cursor: pointer; height: 30px; touch-action: pan-x; }
        input[type=number] { width: 50px; padding: 5px; border: 1px solid #ccc; border-radius: 3px; font-size: 14px; }
        .preview-box { width: 100%; height: 15px; border-radius: 3px; border: 1px solid #eee; }
        .auto-box { background: #f9f9f9; padding: 10px; border-radius: 5px; border: 1px dashed #bbb; }
        .status-tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; background: #eee; color: #666; }
        .status-active { background: #e8f5e9; color: #2e7d32; font-weight: bold; }
        
        /* Ô Nhật ký được kéo dài gấp 5 lần */
        #logContainer {
            background: #fff; border: 1px solid #eee; border-radius: 4px;
            padding: 10px; font-family: monospace; font-size: 0.8rem;
            min-height: 400px; /* Độ dài tối thiểu mới */
            max-height: 1250px; /* Độ dài tối đa mới (gấp 5 lần bản cũ) */
            overflow-y: auto; color: #444; line-height: 1.8;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.02);
        }
        .log-entry { border-bottom: 1px solid #f0f0f0; padding: 8px 0; }
        .log-entry:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div id="appContainer">
    <div id="canvasContainer">
        <canvas id="brockCanvas"></canvas>
    </div>

    <div id="controlsPanel">
        <div class="label-row">
            <h2>Cấu Hình</h2>
            <span id="moveStatus" class="status-tag">ĐANG DỪNG</span>
        </div>
        
        <div class="control-group">
            <div class="label-row">
                <label>Vị trí & Góc</label>
                <span id="angleInfo" class="val-text">--°</span>
            </div>
            <input type="range" id="ySlider" min="0" max="100" step="0.1" value="50">
        </div>

        <div class="auto-box">
            <label style="display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.8rem;">Auto-Move</label>
            <div class="label-row" style="margin-bottom: 5px;">
                <span>Từ: <input type="number" id="posMin" value="10">%</span>
                <span>Đến: <input type="number" id="posMax" value="50">%</span>
            </div>
            <div class="label-row">
                <span>Chu kỳ: <input type="number" id="cycleTime" step="0.1" value="4">s</span>
            </div>
        </div>

        <div class="control-group">
            <label>Màu dấu Sắc</label>
            <input type="range" id="rL" min="0" max="255" value="0">
            <input type="range" id="gL" min="0" max="255" value="255">
            <input type="range" id="bL" min="0" max="255" value="255">
            <div id="preL" class="preview-box"></div>
        </div>

        <div class="control-group">
            <label>Màu dấu Huyền</label>
            <input type="range" id="rR" min="0" max="255" value="255">
            <input type="range" id="gR" min="0" max="255" value="69">
            <input type="range" id="bR" min="0" max="255" value="0">
            <div id="preR" class="preview-box"></div>
        </div>

        <hr style="border:none; border-top:1px solid #eee; margin: 5px 0;">
        
        <h3>Nhật ký tập luyện</h3>
        <div id="logContainer"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('brockCanvas');
    const ctx = canvas.getContext('2d');
    const appContainer = document.getElementById('appContainer');
    const ySlider = document.getElementById('ySlider');
    const angleInfo = document.getElementById('angleInfo');
    const moveStatus = document.getElementById('moveStatus');
    const logContainer = document.getElementById('logContainer');
    
    const posMinInp = document.getElementById('posMin');
    const posMaxInp = document.getElementById('posMax');
    const cycleInp = document.getElementById('cycleTime');

    const colors = {
        left: { r: document.getElementById('rL'), g: document.getElementById('gL'), b: document.getElementById('bL'), pre: document.getElementById('preL') },
        right: { r: document.getElementById('rR'), g: document.getElementById('gR'), b: document.getElementById('bR'), pre: document.getElementById('preR') }
    };

    let isAutoMoving = false;
    let currentYVal = 50;
    let touchStartX = 0;
    let sessionStartTime = 0; 
    let totalTrainingTimeToday = 0; 

    function getRGB(side) {
        return `rgb(${side.r.value}, ${side.g.value}, ${side.b.value})`;
    }

    function formatTime(ms) {
        let s = Math.floor(ms / 1000);
        let h = Math.floor(s / 3600);
        let m = Math.floor((s % 3600) / 60);
        s = s % 60;
        return [h, m, s].map(v => v < 10 ? "0" + v : v).join(":");
    }

    function getTodayKey() {
        const d = new Date();
        return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}`;
    }

    function saveLog() {
        let logs = JSON.parse(localStorage.getItem('brockLogs') || "{}");
        let key = getTodayKey();
        logs[key] = (logs[key] || 0) + totalTrainingTimeToday;
        localStorage.setItem('brockLogs', JSON.stringify(logs));
        totalTrainingTimeToday = 0;
        renderLog();
    }

    function renderLog() {
        let logs = JSON.parse(localStorage.getItem('brockLogs') || "{}");
        logContainer.innerHTML = "";
        Object.keys(logs).reverse().forEach(date => {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.textContent = `${date} - Tổng: ${formatTime(logs[date])}`;
            logContainer.appendChild(div);
        });
    }

    function draw(timestamp) {
        if (isAutoMoving) {
            const elapsed = timestamp / 1000;
            const duration = parseFloat(cycleInp.value) || 4;
            const progress = (Math.sin((2 * Math.PI * elapsed / duration) - Math.PI/2) + 1) / 2;
            const min = parseFloat(posMinInp.value) || 0;
            const max = parseFloat(posMaxInp.value) || 100;
            currentYVal = min + (max - min) * progress;
            ySlider.value = currentYVal.toFixed(1);
        } else {
            currentYVal = parseFloat(ySlider.value);
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const centerX = canvas.width / 2;
        const centerY = canvas.height - (currentYVal / 100) * canvas.height;

        const angleDeg = 60 + (currentYVal / 100) * 20;
        angleInfo.textContent = `Góc: ${angleDeg.toFixed(1)}°`;
        
        const angleRad = (angleDeg * Math.PI) / 180;
        const lineLen = Math.max(canvas.width, canvas.height) * 2;
        const dx = Math.cos(angleRad) * lineLen;
        const dy = Math.sin(angleRad) * lineLen;

        ctx.lineWidth = 10;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.strokeStyle = getRGB(colors.left);
        ctx.moveTo(centerX + dx, centerY - dy); ctx.lineTo(centerX - dx, centerY + dy);
        ctx.stroke();

        ctx.beginPath();
        ctx.strokeStyle = getRGB(colors.right);
        ctx.moveTo(centerX - dx, centerY - dy); ctx.lineTo(centerX + dx, centerY + dy);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(centerX, centerY, 18, 0, Math.PI * 2);
        ctx.fillStyle = "black";
        ctx.fill();

        colors.left.pre.style.backgroundColor = getRGB(colors.left);
        colors.right.pre.style.backgroundColor = getRGB(colors.right);

        requestAnimationFrame(draw);
    }

    function toggleAuto() {
        isAutoMoving = !isAutoMoving;
        if (isAutoMoving) {
            sessionStartTime = performance.now();
            moveStatus.textContent = "ĐANG CHẠY";
            moveStatus.className = "status-tag status-active";
        } else {
            if (sessionStartTime > 0) {
                totalTrainingTimeToday += (performance.now() - sessionStartTime);
                sessionStartTime = 0;
                saveLog();
            }
            moveStatus.textContent = "ĐANG DỪNG";
            moveStatus.className = "status-tag";
        }
    }

    document.addEventListener('touchstart', e => {
        if (e.target.type === 'range' || e.target.type === 'number') return;
        touchStartX = e.changedTouches[0].screenX;
    }, {passive: true});

    document.addEventListener('touchend', e => {
        if (e.target.type === 'range' || e.target.type === 'number') return;
        const diffX = touchStartX - e.changedTouches[0].screenX;
        if (window.innerWidth <= 768 && Math.abs(diffX) > 60) {
            if (diffX > 0) appContainer.classList.add('config-open');
            else appContainer.classList.remove('config-open');
        } else if (e.target === canvas) {
            toggleAuto();
        }
    });

    canvas.addEventListener('click', () => { if (window.innerWidth > 768) toggleAuto(); });

    canvas.addEventListener('wheel', e => {
        if (isAutoMoving) return;
        e.preventDefault();
        let val = parseFloat(ySlider.value);
        ySlider.value = e.deltaY < 0 ? Math.min(100, val + 1) : Math.max(0, val - 1);
        currentYVal = parseFloat(ySlider.value);
    }, { passive: false });

    window.addEventListener('beforeunload', () => {
        if (isAutoMoving && sessionStartTime > 0) {
            totalTrainingTimeToday += (performance.now() - sessionStartTime);
            saveLog();
        }
    });

    function resize() {
        canvas.width = document.getElementById('canvasContainer').clientWidth - 20;
        canvas.height = document.getElementById('canvasContainer').clientHeight - 20;
    }

    window.addEventListener('resize', resize);
    resize();
    renderLog();
    requestAnimationFrame(draw);
</script>

</body>
</html>
