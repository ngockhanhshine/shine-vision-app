<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anaglyph Piano Hardcore V3 - Shine Vision</title>
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        canvas { 
            background: white; 
            box-shadow: 0 0 30px rgba(255,255,255,0.2); 
            width: 100vw; height: 56.25vw; 
            max-height: 100vh; max-width: 177.78vh; 
            object-fit: contain;
        }
        #ui-layer { 
            position: absolute; background: rgba(255, 255, 255, 0.95); 
            padding: 15px; border-radius: 12px; display: flex; flex-direction: row; 
            gap: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            max-width: 95%; max-height: 90%; overflow-y: auto; z-index: 10; 
        }
        .column { display: flex; flex-direction: column; min-width: 220px; }
        h2 { margin: 10px 0 5px 0; color: #333; font-size: 14px; border-bottom: 2px solid #ddd; }
        .mode-selector { display: flex; gap: 5px; margin-bottom: 10px; }
        .mode-btn { flex: 1; padding: 8px; border: 1px solid #ccc; background: #eee; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 11px; }
        .mode-btn.active { background: #d32f2f; color: white; border-color: #b71c1c; }
        .song-list { height: 100px; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; background: #fff; }
        .song-item { padding: 6px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 12px; }
        .selected { background: #ffebeb !important; color: #d32f2f; font-weight: bold; }
        .color-control { padding: 5px; border: 1px solid #eee; margin-bottom: 5px; border-radius: 5px; }
        .slider-group { display: flex; align-items: center; gap: 5px; font-size: 10px; }
        .slider-group input { flex: 1; }
        .demo-box { height: 30px; margin-top: 5px; border-radius: 3px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: bold; }
        .start-btn { background: #d32f2f; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #rotate-message { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; z-index: 999; justify-content: center; align-items: center; text-align: center; }
        
        /* CSS CHO BẢNG HƯỚNG DẪN */
        #guide-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 15px; max-width: 600px; width: 90%;
            max-height: 80vh; overflow-y: auto; position: relative; font-size: 14px; line-height: 1.6;
        }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; font-weight: bold; color: #d32f2f; }
        
        @media screen and (orientation: portrait) and (max-width: 900px) { #rotate-message { display: flex; } }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="rotate-message"><div>🔄 Vui lòng xoay ngang điện thoại!</div></div>

    <div id="guide-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleGuide(false)">&times;</span>
            <div id="guide-body">Đang tải hướng dẫn...</div>
        </div>
    </div>

    <div id="ui-layer">
        <div class="column">
            <h2>CHẾ ĐỘ (LANES)</h2>
            <div class="mode-selector">
                <button class="mode-btn" id="btn4" onclick="setMode(4)">4</button>
                <button class="mode-btn" id="btn8" onclick="setMode(8)">8</button>
                <button class="mode-btn" id="btn10" onclick="setMode(10)">10</button>
            </div>
            <h2>BÀI HÁT</h2>
            <div id="song-list" class="song-list"></div>
            <input type="file" id="audio-upload" accept="audio/*" style="font-size: 10px; margin-top: 5px;">
            <input type="number" id="custom-bpm" value="120" style="width: 50px;"> <small>BPM</small>
            <button class="start-btn" onclick="handleStart()">BẮT ĐẦU</button>
        </div>
        <div class="column">
            <h2>CÂN MÀU</h2>
            <div class="color-control">
                <div class="slider-group">R<input type="range" id="r1" min="0" max="255" value="255"></div>
                <div class="slider-group">G<input type="range" id="g1" min="0" max="255" value="131"></div>
                <div class="slider-group">B<input type="range" id="b1" min="0" max="255" value="55"></div>
                <div id="demo1" class="demo-box">MẮT TRÁI</div>
            </div>
            <div class="color-control">
                <div class="slider-group">R<input type="range" id="r2" min="0" max="255" value="0"></div>
                <div class="slider-group">G<input type="range" id="g2" min="0" max="255" value="255"></div>
                <div class="slider-group">B<input type="range" id="b2" min="0" max="255" value="255"></div>
                <div id="demo2" class="demo-box">MẮT PHẢI</div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" width="1920" height="1080"></canvas>

    <script src="readme.js"></script> 
    <script>
        /* =========================================================
           MÃ KIỂM TRA ĐĂNG NHẬP (TRUY CẬP THƯ MỤC MẸ)
           ========================================================= */
        (function() {
            function checkAccess() {
                const loginData = JSON.parse(localStorage.getItem('user_login'));
                const currentTime = new Date().getTime();
                const TWENTY_FOUR_HOURS = 24 * 60 * 60 * 1000;

                if (!loginData || (currentTime - loginData.loginTime > TWENTY_FOUR_HOURS)) {
                    localStorage.removeItem('user_login');
                    alert("Phiên đăng nhập đã hết hạn hoặc bạn chưa đăng nhập!");
                    window.location.href = '../index.html'; 
                }
            }
            checkAccess();
            // Lắng nghe nếu đăng xuất từ tab khác
            window.addEventListener('storage', (e) => {
                if (e.key === 'user_login' && e.newValue === null) {
                    window.location.href = '../index.html';
                }
            });
            // Kiểm tra lại khi người dùng quay lại tab này
            window.onfocus = () => checkAccess();
        })();

        /* =========================================================
           GIỮ NGUYÊN TOÀN BỘ LOGIC GAME GỐC
           ========================================================= */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiLayer = document.getElementById('ui-layer');

        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const WIDTH = 1920, HEIGHT = 1080;
        
        const HIT_ZONE_Y = isMobile ? HEIGHT * 0.6 : HEIGHT * 0.85;
        const HIT_WINDOW = isMobile ? 250 : 180;
        const NOTE_HEIGHT = isMobile ? 200 : 100;

        let numLanes = 4;
        const KEY_MAPS = {
            4: ['f', 'g', 'h', 'j'],
            8: ['a', 's', 'd', 'f', 'j', 'k', 'l', ';'],
            10: ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l', ';']
        };
        let laneKeys = KEY_MAPS[4];

        const SONGS = [
            {name: "Shape Of You (96 BPM)", bpm: 96, file: "sounds/Shape-Of-You.mp3"},
            {name: "Monkey Dance (98 BPM)", bpm: 98, file: "sounds/Monkey-Dance.mp3"},
            {name: "BabyShark (115 BPM)", bpm: 115, file: "sounds/BabyShark.mp3"},
            {name: "Sugar (120 BPM)", bpm: 120, file: "sounds/Sugar.mp3"},
            {name: "Beliver (125 BPM)", bpm: 125, file: "sounds/Beliver.mp3"}
        ];

        let selectedSongIdx = 0, gameState = 'MENU', score = 0, notes = [], particles = [];
        let startTime = 0, currentAudio = null, feedbackTimer = 0, feedbackText = "";
        let colorRed = {r:255, g:131, b:55}, colorCyan = {r:0, g:255, b:255};

        // --- WEB AUDIO API ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let dingBuffer = null;
        async function loadDing() {
            try {
                const response = await fetch('sounds/Ding.wav');
                const arrayBuffer = await response.arrayBuffer();
                dingBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            } catch(e) { console.warn("Audio load failed."); }
        }
        loadDing();

        function playDing() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (dingBuffer) {
                const source = audioCtx.createBufferSource();
                source.buffer = dingBuffer;
                source.connect(audioCtx.destination);
                source.start(0);
            } else {
                new Audio('sounds/Ding.wav').cloneNode().play();
            }
        }
        const failSound = new Audio('sounds/Fail.wav');

        // --- MODAL & HOTKEYS ---
        function toggleGuide(show) {
            const modal = document.getElementById('guide-modal');
            const body = document.getElementById('guide-body');
            if (show) {
                body.innerHTML = typeof contentGuide !== 'undefined' ? contentGuide : "Chưa có nội dung hướng dẫn.";
                modal.style.display = 'flex';
            } else {
                modal.style.display = 'none';
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.key === 's')) {
                e.preventDefault();
                toggleGuide(true);
            }
            if (e.key === 'Escape') { 
                if (document.getElementById('guide-modal').style.display === 'flex') {
                    toggleGuide(false);
                } else if(currentAudio) {
                    currentAudio.pause(); gameState = 'MENU'; uiLayer.style.display = 'flex'; 
                }
            }

            if (gameState === 'PLAYING') {
                let idx = laneKeys.indexOf(e.key.toLowerCase());
                if (idx !== -1) checkHit(idx);
            }
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vx = (Math.random() - 0.5) * 30;
                this.vy = (Math.random() - 0.5) * 30;
                this.alpha = 1;
                this.size = Math.random() * 8 + 4;
            }
            update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.03; }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function createExplosion(laneIdx) {
            const laneW = WIDTH / numLanes;
            const centerX = laneIdx * laneW + laneW / 2;
            const color = (laneIdx % 2 === 0) ? `rgb(${colorRed.r},${colorRed.g},${colorRed.b})` : `rgb(${colorCyan.r},${colorCyan.g},${colorCyan.b})`;
            for (let i = 0; i < 15; i++) { particles.push(new Particle(centerX, HIT_ZONE_Y, color)); }
        }

        function saveConfig() { localStorage.setItem('anaglyph_config', JSON.stringify({ colorRed, colorCyan, numLanes })); }

        function loadConfig() {
            const data = localStorage.getItem('anaglyph_config');
            if (data) {
                const config = JSON.parse(data);
                colorRed = config.colorRed; colorCyan = config.colorCyan;
                setMode(config.numLanes || 4);
                document.getElementById('r1').value = colorRed.r; document.getElementById('g1').value = colorRed.g; document.getElementById('b1').value = colorRed.b;
                document.getElementById('r2').value = colorCyan.r; document.getElementById('g2').value = colorCyan.g; document.getElementById('b2').value = colorCyan.b;
            } else { setMode(4); }
            updateUIColors();
        }

        function setMode(n) {
            numLanes = n; laneKeys = KEY_MAPS[n];
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn' + n).classList.add('active');
            saveConfig();
        }

        function updateUIColors() {
            colorRed = { r: document.getElementById('r1').value, g: document.getElementById('g1').value, b: document.getElementById('b1').value };
            colorCyan = { r: document.getElementById('r2').value, g: document.getElementById('g2').value, b: document.getElementById('b2').value };
            document.getElementById('demo1').style.backgroundColor = `rgb(${colorRed.r},${colorRed.g},${colorRed.b})`;
            document.getElementById('demo2').style.backgroundColor = `rgb(${colorCyan.r},${colorCyan.g},${colorCyan.b})`;
            saveConfig();
        }
        document.querySelectorAll('input[type=range]').forEach(i => i.addEventListener('input', updateUIColors));

        function renderSongList() {
            const list = document.getElementById('song-list');
            list.innerHTML = '';
            SONGS.forEach((song, i) => {
                const div = document.createElement('div');
                div.className = `song-item ${i === selectedSongIdx ? 'selected' : ''}`;
                div.innerText = song.name;
                div.onclick = () => { selectedSongIdx = i; renderSongList(); };
                list.appendChild(div);
            });
        }

        class Note {
            constructor(lane, hitTime, speed) {
                this.lane = lane; this.hitTime = hitTime; this.speed = speed;
                this.hit = false; this.y = -NOTE_HEIGHT;
            }
            update(currentTime) { this.y = HIT_ZONE_Y - ((this.hitTime - currentTime) * this.speed); }
            draw(laneW) {
                const c = (this.lane % 2 === 0) ? colorRed : colorCyan;
                ctx.fillStyle = `rgb(${c.r},${c.g},${c.b})`;
                ctx.fillRect(this.lane * laneW + 20, this.y, laneW - 40, NOTE_HEIGHT);
            }
        }

        async function handleStart() {
            if (isMobile) {
                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
                else if (document.documentElement.webkitRequestFullscreen) document.documentElement.webkitRequestFullscreen();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const fileInput = document.getElementById('audio-upload');
            let bpm = (fileInput.files.length > 0) ? parseInt(document.getElementById('custom-bpm').value) : SONGS[selectedSongIdx].bpm;
            let audioSrc = (fileInput.files.length > 0) ? URL.createObjectURL(fileInput.files[0]) : SONGS[selectedSongIdx].file;

            gameState = 'PLAYING'; uiLayer.style.display = 'none';
            score = 0; notes = []; particles = [];
            const beatInterval = 60 / bpm;
            const noteSpeed = HIT_ZONE_Y / (beatInterval * 2);

            for (let i = 0; i < 1000; i++) { notes.push(new Note(Math.floor(Math.random() * numLanes), 3.0 + i * beatInterval, noteSpeed)); }

            currentAudio = new Audio(audioSrc);
            currentAudio.play();
            startTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (gameState !== 'PLAYING') return;
            let currentTime = (performance.now() - startTime) / 1000;
            const laneW = WIDTH / numLanes;
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, WIDTH, HEIGHT);
            ctx.strokeStyle = "#f5f5f5"; ctx.lineWidth = 2;
            for(let i=1; i<numLanes; i++) { ctx.beginPath(); ctx.moveTo(i * laneW, 0); ctx.lineTo(i * laneW, HEIGHT); ctx.stroke(); }
            ctx.strokeStyle = "#ddd"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, HIT_ZONE_Y); ctx.lineTo(WIDTH, HIT_ZONE_Y); ctx.stroke();

            for (let i = notes.length - 1; i >= 0; i--) {
                let n = notes[i]; n.update(currentTime);
                if (!n.hit) {
                    n.draw(laneW);
                    if (n.y > HIT_ZONE_Y + 150) { failSound.cloneNode().play(); notes.splice(i, 1); feedbackText = "MISS"; feedbackTimer = 20; }
                } else { notes.splice(i, 1); }
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }
            const fontSize = numLanes > 8 ? 35 : 50;
            ctx.font = `bold ${fontSize}px Arial`; ctx.textAlign = "center";
            laneKeys.forEach((key, i) => {
                const c = (i % 2 === 0) ? colorRed : colorCyan;
                ctx.fillStyle = `rgb(${c.r},${c.g},${c.b})`;
                ctx.fillText(key.toUpperCase(), i * laneW + (laneW/2), HIT_ZONE_Y + fontSize + 25);
            });
            ctx.textAlign = "left"; ctx.fillStyle = "#333"; ctx.font = "bold 45px Arial";
            ctx.fillText(`SCORE: ${score}`, 50, 80);
            if (feedbackTimer > 0) {
                ctx.fillStyle = feedbackText === "MISS" ? "red" : "#2e7d32";
                ctx.textAlign = "center"; ctx.fillText(feedbackText, WIDTH/2, 250);
                feedbackTimer--;
            }
            if (currentAudio.ended) { 
                gameState = 'MENU'; uiLayer.style.display = 'flex'; 
                if (isMobile && document.fullscreenElement) document.exitFullscreen().catch(()=>{});
            }
            requestAnimationFrame(gameLoop);
        }

        function checkHit(laneIdx) {
            if (gameState !== 'PLAYING') return;
            let found = false;
            for (let n of notes) {
                if (n.lane === laneIdx && !n.hit && Math.abs(n.y - HIT_ZONE_Y) < HIT_WINDOW) {
                    n.hit = true; found = true;
                    playDing();
                    score += 10; feedbackText = "PERFECT"; feedbackTimer = 20;
                    createExplosion(laneIdx);
                    break;
                }
            }
            if (!found) failSound.cloneNode().play();
        }

        canvas.addEventListener('touchstart', (e) => {
            if (gameState !== 'PLAYING') return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = WIDTH / rect.width;
            for (let i = 0; i < e.changedTouches.length; i++) {
                let x = (e.changedTouches[i].clientX - rect.left) * scaleX;
                checkHit(Math.floor(x / (WIDTH / numLanes)));
            }
        }, {passive: false});

        loadConfig(); renderSongList();
    </script>
</body>
</html>
