<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schulte Vision Training - Secure Edition</title>
    <script src="../auth.js"></script>
    <script src="readme.js"></script> 
    <script>
        function silentCheck() {
            const loginData = JSON.parse(localStorage.getItem('user_login'));
            const currentTime = new Date().getTime();
            const TWENTY_FOUR_HOURS = 24 * 60 * 60 * 1000;

            if (!loginData || (currentTime - loginData.loginTime > TWENTY_FOUR_HOURS)) {
                localStorage.removeItem('user_login');
                window.location.href = '../index.html'; 
                return false;
            }
            return true;
        }

        window.addEventListener('storage', (event) => {
            if (event.key === 'user_login' && event.newValue === null) {
                window.location.href = '../index.html';
            }
        });

        silentCheck();
    </script>
    <style>
        :root { --cell-size: 80px; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: Arial, sans-serif; background-color: #000; }

        .background-noise {
            position: fixed; top: -100%; left: 0; width: 100%; height: 300%;
            background: repeating-linear-gradient(45deg, #000, #000 25px, #fff 25px, #fff 50px);
            z-index: 1; animation: moveUpDown 3s ease-in-out infinite alternate;
        }

        @keyframes moveUpDown { from { transform: translateY(0); } to { transform: translateY(100px); } }

        .main-container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; min-height: 100vh; width: 100%; }

        /* Sidebar & Panels */
        .sidebar-left { position: absolute; left: 20px; top: 100px; width: 240px; display: flex; flex-direction: column; gap: 20px; z-index: 20; }
        .panel { background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .timer-container { padding-top: 20px; margin-bottom: 20px; }
        .timer-box { background: rgba(255, 255, 255, 0.9); padding: 10px 30px; border-radius: 4px; font-size: 24px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* Grid */
        .grid-container { display: flex; justify-content: center; align-items: center; flex-grow: 1; margin: 20px 0; }
        .grid { display: grid; gap: 2px; background-color: transparent; }
        .cell {
            width: var(--cell-size); height: var(--cell-size); background: rgba(255, 255, 255, 0.3);
            display: flex; justify-content: center; align-items: center; font-size: 26px; font-weight: bold;
            color: #000; cursor: pointer; user-select: none; transition: background 0.1s; -webkit-tap-highlight-color: transparent;
        }
        .cell:active { background: rgba(255, 255, 255, 0.7); }
        .cell.correct { background: rgba(0, 255, 0, 0.5); color: #fff; }

        /* Overlay Hướng dẫn */
        #readme-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 9999;
            display: none; justify-content: center; align-items: center; color: white; padding: 20px;
        }
        .readme-content {
            background: #fff; color: #333; padding: 30px; border-radius: 8px;
            max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; position: relative;
        }
        .close-readme {
            position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; font-weight: bold; color: #ff0000;
        }

        .footer-action { padding-bottom: 30px; width: 100%; display: flex; justify-content: center; }
        .btn-restart { padding: 12px 50px; font-size: 18px; font-weight: bold; cursor: pointer; background: rgba(255, 0, 0, 0.9); border: none; border-radius: 4px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .history-list { font-size: 14px; max-height: 300px; overflow-y: auto; line-height: 1.8; margin-top: 10px; }
        select { width: 100%; padding: 8px; font-size: 16px; }

        @media (max-width: 768px) {
            .main-container { padding: 15px; box-sizing: border-box; justify-content: flex-start; }
            .sidebar-left { position: static; width: 100%; max-width: 400px; display: contents; }
            .panel-grid-select { order: 1; width: 100%; max-width: 400px; } 
            .timer-container { order: 2; margin: 10px 0; }
            .grid-container { order: 3; width: 100%; margin: 10px 0; }
            .footer-action { order: 4; padding-bottom: 15px; }
            .panel-history { order: 5; width: 100%; max-width: 400px; }
            .btn-restart { width: 100%; }
        }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="background-noise"></div>

    <div id="readme-overlay">
        <div class="readme-content">
            <span class="close-readme" onclick="closeReadme()">&times;</span>
            <div id="readme-body">Nội dung hướng dẫn đang được tải...</div>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar-left">
            <div class="panel panel-grid-select">
                <select id="grid-size" onchange="changeGridSize()">
                    <option value="3">Dễ (3x3)</option>
                    <option value="4">Trung bình (4x4)</option>
                    <option value="5" selected>Khó (5x5)</option>
                    <option value="6">Rất khó (6x6)</option>
                </select>
            </div>
            <div class="panel panel-history">
                <strong style="border-bottom: 1px solid #ccc; display: block; padding-bottom: 5px;">Nhật ký luyện tập</strong>
                <div id="history-list" class="history-list"></div>
            </div>
        </div>

        <div class="timer-container">
            <div class="timer-box">Thời gian: <span id="timer">0.0</span>s</div>
        </div>

        <div class="grid-container">
            <div id="grid" class="grid"></div>
        </div>

        <div class="footer-action">
            <button class="btn-restart" onclick="initGame()">Bắt đầu lại</button>
        </div>
    </div>

    <audio id="snd-ding" src="sounds/Ding.wav"></audio>
    <audio id="snd-fail" src="sounds/Fail.wav"></audio>
    <audio id="snd-finish" src="sounds/Finish.mp3"></audio>

    <script>
        // --- LOGIC KHÓA PHÍM & HIỆN README ---
        const overlay = document.getElementById('readme-overlay');
        const readmeBody = document.getElementById('readme-body');

        function openReadme() {
            // Lấy biến từ file readme.js (Ví dụ biến đó tên là readmeContent)
            if (typeof readmeContent !== 'undefined') {
                readmeBody.innerHTML = readmeContent;
            } else {
                readmeBody.innerHTML = "<h3>Hướng dẫn sử dụng</h3><p>Vui lòng tập trung vào số 1 ở tâm và tìm các số tiếp theo bằng mắt ngoại vi.</p>";
            }
            overlay.style.display = 'flex';
        }

        function closeReadme() { overlay.style.display = 'none'; }

        window.addEventListener('keydown', function(e) {
            // Chặn F12, Ctrl+Shift+I/J/C, Ctrl+U, Ctrl+R, F5, Cmd+Option+I, Cmd+R
            const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
            const isDevKey = (e.keyCode === 123) || // F12
                             (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || // Ctrl+Shift+I/J/C
                             (e.ctrlKey && e.keyCode === 85) || // Ctrl+U
                             (e.ctrlKey && e.keyCode === 82) || // Ctrl+R
                             (e.ctrlKey && e.keyCode === 83) || // Ctrl+S
                             (isMac && e.metaKey && e.altKey && e.keyCode === 73) || // Cmd+Opt+I
                             (isMac && e.metaKey && e.keyCode === 83) || // Cmd+S (Lưu trang - Mac)
                             (isMac && e.metaKey && e.keyCode === 82); // Cmd+R

            if (isDevKey) {
                e.preventDefault();
                openReadme();
            }
        });

        // --- BẢO MẬT CẤP ĐỘ CAO NHẤT: VĂNG NGAY LẬP TỨC ---
        (function() {
            const check = function() {
                // 1. Check dựa trên sự thay đổi kích thước (Chặn việc resize để mở Console)
                const threshold = 160;
                const widthThreshold = window.outerWidth - window.innerWidth > threshold;
                const heightThreshold = window.outerHeight - window.innerHeight > threshold;
        
                // 2. Check bằng cách định nghĩa lại phương thức getter của Console
                const devtools = { open: false };
                const element = new Image();
                Object.defineProperty(element, 'id', {
                    get: function() {
                        devtools.open = true;
                        // Kích hoạt văng ngay khi thuộc tính này được Console truy cập để render
                        terminateSession();
                    }
                });

                // 3. Hàm xử lý tiêu diệt tab
                function terminateSession() {
                    localStorage.removeItem('user_login');
                    // Dùng replace để không thể quay lại trang cũ
                    window.location.replace("about:blank");
                    // Ghi đè trắng xóa ngay lập tức trước khi chuyển hướng kịp nạp
                    document.body.innerHTML = "";
                }

                // Liên tục bắn log giả vào console để kích hoạt getter phía trên
                console.log(element);
                console.clear();

                // Nếu phát hiện mở Console (qua kích thước hoặc getter)
                if (widthThreshold || heightThreshold || devtools.open) {
                    terminateSession();
                }
            };

            // Chặn debugger truyền thống để bổ trợ
            setInterval(function() {
                const start = performance.now();
                debugger;
                if (performance.now() - start > 50) {
                    window.location.replace("about:blank");
                }
            }, 100);

            // Kiểm tra liên tục mỗi 100ms
            setInterval(check, 100);
            window.addEventListener('resize', check);
        })();

        // --- GAME LOGIC ---
        let size = 5;
        let expectedNum = 1;
        let timerInterval;
        let startTime;
        let isRunning = false;
        let sessionCount = 0;

        const gridElement = document.getElementById('grid');
        const timerElement = document.getElementById('timer');
        const sizeSelect = document.getElementById('grid-size');
        const historyList = document.getElementById('history-list');

        function playSound(audio) {
            audio.currentTime = 0;
            audio.play().catch(e => {});
        }

        function changeGridSize() {
            if (!silentCheck()) return;
            localStorage.setItem('schulte_last_size', sizeSelect.value);
            initGame();
        }

        function initGame() {
            if (!silentCheck()) return;
            size = parseInt(sizeSelect.value);
            expectedNum = 1;
            isRunning = false;
            clearInterval(timerInterval);
            timerElement.textContent = "0.0";

            const total = size * size;
            let numbers = Array.from({length: total}, (_, i) => i + 1);
            numbers.sort(() => Math.random() - 0.5);

            let screenWidth = window.innerWidth;
            let availableWidth = screenWidth < 768 ? screenWidth - 40 : 600; 
            let dynamicSize = Math.floor(availableWidth / size);
            let finalCellSize = Math.min(dynamicSize, screenWidth < 768 ? 70 : 80);
            
            document.documentElement.style.setProperty('--cell-size', finalCellSize + 'px');
            gridElement.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            gridElement.innerHTML = '';
            
            numbers.forEach(num => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = num;
                cell.onclick = () => handleClick(num, cell);
                gridElement.appendChild(cell);
            });
        }

        function handleClick(num, cell) {
            if (!silentCheck()) return;
            if (!isRunning && num === 1) {
                isRunning = true;
                startTime = Date.now();
                timerInterval = setInterval(() => {
                    timerElement.textContent = ((Date.now() - startTime) / 1000).toFixed(1);
                }, 100);
            }
            if (isRunning) {
                if (num === expectedNum) {
                    playSound(document.getElementById('snd-ding'));
                    cell.classList.add('correct');
                    expectedNum++;
                    if (expectedNum > size * size) {
                        clearInterval(timerInterval);
                        isRunning = false;
                        playSound(document.getElementById('snd-finish'));
                        saveHistory(timerElement.textContent);
                    }
                } else if (!cell.classList.contains('correct')) {
                    playSound(document.getElementById('snd-fail'));
                }
            }
        }

        function saveHistory(time) {
            sessionCount++;
            const now = new Date();
            const dateStr = `${now.getDate().toString().padStart(2, '0')}/${(now.getMonth()+1).toString().padStart(2, '0')}`;
            const logText = `${dateStr} - L${sessionCount} - ${size}x${size} - ${time}s`;
            addLogToUI(logText);
            const savedLogs = JSON.parse(localStorage.getItem('schulte_history') || '[]');
            savedLogs.unshift(logText);
            localStorage.setItem('schulte_history', JSON.stringify(savedLogs.slice(0, 100)));
            localStorage.setItem('schulte_session_count', sessionCount);
        }

        function addLogToUI(text) {
            const logEntry = document.createElement('div');
            logEntry.textContent = text;
            logEntry.style.borderBottom = "1px dashed #ccc";
            historyList.prepend(logEntry);
        }

        function loadSavedData() {
            const lastSize = localStorage.getItem('schulte_last_size');
            if (lastSize) sizeSelect.value = lastSize;
            sessionCount = parseInt(localStorage.getItem('schulte_session_count') || '0');
            const savedLogs = JSON.parse(localStorage.getItem('schulte_history') || '[]');
            savedLogs.reverse().forEach(log => addLogToUI(log));
        }

        loadSavedData();
        initGame();
        window.addEventListener('resize', initGame);
    </script>
</body>
</html>
