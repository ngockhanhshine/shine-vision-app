<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Finger Dance - Audition Therapy Pro</title>
    <script src="readme.js"></script> 
    <style>
        :root { --red-main: #d32f2f; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #222; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; }
        #app-container { width: 85vw; height: 85vh; max-width: 950px; max-height: 600px; background: white; border-radius: 12px; position: relative; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }

        /* --- CSS MÀN HÌNH HƯỚNG DẪN (KHÓA CONSOLE) --- */
        #instruction-overlay { 
            display: none; position: absolute; inset: 0; 
            background: rgba(0,0,0,0.95); z-index: 9999; 
            color: white; padding: 40px; overflow-y: auto;
            flex-direction: column; align-items: center;
        }
        .instruction-content { max-width: 600px; line-height: 1.6; font-size: 1rem; }
        .btn-close-ins { margin-top: 20px; background: var(--red-main); color: white; border: none; padding: 10px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Menu & UI cũ giữ nguyên */
        #menu-layer { position: absolute; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; padding: 15px 25px; box-sizing: border-box; overflow-y: auto; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        h3 { margin: 0 0 8px 0; font-size: 0.9rem; text-transform: uppercase; color: #333; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .song-list, .char-select { border: 1px solid #ddd; height: 100px; overflow-y: auto; border-radius: 4px; background: #fff; margin-bottom: 10px; }
        .item { padding: 6px 12px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .item:hover { background: #fef2f2; }
        .item.active { background: #fff5f5; color: var(--red-main); font-weight: bold; border-left: 4px solid var(--red-main); }
        .custom-upload { border: 1px dashed #ccc; padding: 10px; border-radius: 6px; background: #fafafa; margin-bottom: 10px; }
        .custom-upload label { font-size: 0.8rem; font-weight: bold; display: block; margin-bottom: 5px; }
        .custom-upload input { font-size: 0.8rem; width: 100%; box-sizing: border-box; }
        .rgb-panel { border: 1px solid #eee; padding: 8px; border-radius: 8px; margin-bottom: 8px; background: #fafafa; }
        .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
        .slider-row label { width: 15px; font-weight: bold; font-size: 11px; }
        input[type="range"] { flex: 1; height: 4px; cursor: pointer; }
        .demo-box { width: 100%; height: 30px; border-radius: 4px; margin-top: 5px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 0.75rem; color: white; }
        .btn-start { background: var(--red-main); color: white; border: none; padding: 12px; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }

        #loading-overlay { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.9); z-index: 200; flex-direction: column; justify-content: center; align-items: center; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid var(--red-main); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #leaderboard { margin-top: 15px; padding: 10px; border: 1px solid #eee; border-radius: 8px; background: #f9f9f9; }
        .lb-title { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #666; text-align: center; }
        .lb-row { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 2px 5px; border-bottom: 1px solid #f0f0f0; }

        #game-layer { display: none; width: 100%; height: 100%; position: relative; }
        canvas { display: block; background: #fff; width: 100%; height: 100%; }
        .hud { position: absolute; top: 15px; left: 20px; font-size: 18px; font-weight: bold; color: #333; z-index: 10; pointer-events: none; }
        
        #result-board { display: none; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.95); padding: 20px 40px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.3); text-align: center; z-index: 20; border: 3px solid var(--red-main); }
        .res-score { font-size: 2.5rem; font-weight: 900; color: var(--red-main); margin: 10px 0; }
        .btn-back { background: #333; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        #charVideo { display: none; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="instruction-overlay">
        <h2 style="color: var(--red-main);">HƯỚNG DẪN SỬ DỤNG</h2>
        <div id="readme-content" class="instruction-content"></div>
        <button class="btn-close-ins" onclick="closeInstruction()">ĐÓNG</button>
    </div>

    <div id="loading-overlay">
        <div class="loader"></div>
        <div id="loading-text" style="font-weight: bold; color: #333;">ĐANG TẢI DỮ LIỆU...</div>
    </div>

    <div id="menu-layer">
        <div class="menu-grid">
            <div class="left-col">
                <h3>1. Chọn bài hát</h3>
                <div class="song-list" id="songList">
                    <div class="item song active" data-bpm="96" data-file="Shape-Of-You.mp3">Shape Of You (96 BPM)</div>
                    <div class="item song" data-bpm="115" data-file="BabyShark.mp3">BabyShark (115 BPM)</div>
                    <div class="item song" data-bpm="124" data-file="Counting-Star.mp3">Counting Star (124 BPM)</div>
                </div>
                <h3>2. Tự tải nhạc</h3>
                <div class="custom-upload">
                    <input type="file" id="userAudioFile" accept="audio/*">
                    <label style="margin-top:8px;">BPM:</label>
                    <input type="number" id="userBPM" value="120">
                </div>
                <h3>3. Chọn nhân vật</h3>
                <div class="char-select" id="charSelect">
                    <div class="item char active" data-prefix="ami">Nhân vật Ami</div>
                    <div class="item char" data-prefix="alex">Nhân vật Alex</div>
                </div>
            </div>
            <div class="right-col">
                <h3>4. Anaglyph</h3>
                <div class="rgb-panel">
                    <div class="slider-row"><label>R</label><input type="range" id="r1" min="0" max="255" value="255"></div>
                    <div class="slider-row"><label>G</label><input type="range" id="g1" min="0" max="255" value="0"></div>
                    <div class="slider-row"><label>B</label><input type="range" id="b1" min="0" max="255" value="0"></div>
                    <div class="demo-box" id="demo1">KÍNH TRÁI</div>
                </div>
                <div class="rgb-panel">
                    <div class="slider-row"><label>R</label><input type="range" id="r2" min="0" max="255" value="0"></div>
                    <div class="slider-row"><label>G</label><input type="range" id="g2" min="0" max="255" value="255"></div>
                    <div class="slider-row"><label>B</label><input type="range" id="b2" min="0" max="255" value="255"></div>
                    <div class="demo-box" id="demo2">KÍNH PHẢI</div>
                </div>
                <div id="leaderboard">
                    <div class="lb-title">TOP 5 ĐIỂM CAO</div>
                    <div id="lb-content"></div>
                </div>
            </div>
        </div>
        <button class="btn-start" onclick="handlePreloadThenStart()">BẮT ĐẦU</button>
    </div>

    <div id="game-layer">
        <div class="hud" id="hudStatus">Level: 1 | Count: 0/1 | Score: 0</div>
        <canvas id="gameCanvas"></canvas>
        <div id="result-board">
            <div style="font-weight:bold; color:#666;">KẾT QUẢ</div>
            <div class="res-score" id="finalScoreDisplay">0</div>
            <button class="btn-back" onclick="clearPauseData(); location.reload();">QUAY LẠI MENU</button>
        </div>
    </div>
</div>

<video id="charVideo" muted playsinline></video>
<audio id="audioMusic"></audio>
<audio id="audioDing" src="sounds/Ding.wav"></audio>
<audio id="audioFail" src="sounds/Fail.wav"></audio>
<audio id="audioLevelUp"></audio>
<audio id="audioClap" src="sounds/clap.mp3"></audio>

<script>
// --- GIẢ LẬP NỘI DUNG NẾU FILE README.JS CHƯA CÓ BIẾN ---
if (typeof readmeText === 'undefined') {
    var readmeText = "Chào mừng bạn đến với Finger Dance! <br><br> 1. Dùng các phím mũi tên để nhập chuỗi.<br> 2. Nhấn Space khi kim quay vào vùng màu xanh.<br>";
}

// --- LOGIC KHÓA CONSOLE & HIỆN README ---
window.addEventListener('keydown', function(e) {
    if (e.key === 'F12' || (e.ctrlKey && e.key === 's') || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
        e.preventDefault();
        showInstruction();
    }
});

function showInstruction() {
    const overlay = document.getElementById('instruction-overlay');
    const content = document.getElementById('readme-content');
    content.innerHTML = readmeText;
    overlay.style.display = 'flex';
}

function closeInstruction() {
    document.getElementById('instruction-overlay').style.display = 'none';
}

// --- KHAI BÁO BIẾN GAME ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const charVid = document.getElementById('charVideo');
const audioMusic = document.getElementById('audioMusic');
const audioDing = document.getElementById('audioDing');
const audioFail = document.getElementById('audioFail');
const audioLevelUp = document.getElementById('audioLevelUp');
const audioClap = document.getElementById('audioClap');

let bpm = 96, level = 1, successCount = 0, score = 0, charPrefix = "ami";
let sequence = [], userInput = [], fanAngle = 0, lastBeat = -1;
let lastTime = 0, msg = "", msgTime = 0, isEnding = false;
let particles = []; 
let isPreFinish = false, preFinishCounter = 0;
let isPostFinishWait = false, postFinishCounter = 0;
let isGameRunning = false; // Biến kiểm soát trạng thái game đang chơi hay menu

const ARROWS = { ArrowUp: 'U', ArrowDown: 'D', ArrowLeft: 'L', ArrowRight: 'R' };

// --- LOGIC PAUSE & RESUME ---
function checkResumeGame() {
    const savedData = sessionStorage.getItem('game_pause_data');
    if (savedData) {
        const data = JSON.parse(savedData);
        bpm = data.bpm;
        level = data.level;
        successCount = data.successCount;
        score = data.score;
        charPrefix = data.charPrefix;
        fanAngle = data.fanAngle;
        audioMusic.src = data.musicSrc;
        audioMusic.currentTime = data.musicTime;
        
        // Nhảy thẳng vào game
        isEnding = false;
        document.getElementById('menu-layer').style.display = 'none';
        document.getElementById('game-layer').style.display = 'block';
        resize();
        generateSeq();
        playVideo('wait');
        audioMusic.play();
        isGameRunning = true;
        requestAnimationFrame(gameLoop);
        sessionStorage.removeItem('game_pause_data'); // Xóa sau khi đã resume
    }
}

function clearPauseData() {
    sessionStorage.removeItem('game_pause_data');
}

// Lắng nghe sự kiện chuột rời khỏi trình duyệt
document.addEventListener('mouseleave', () => {
    if (isGameRunning && !isEnding) {
        const pauseData = {
            bpm, level, successCount, score, charPrefix, fanAngle,
            musicSrc: audioMusic.src,
            musicTime: audioMusic.currentTime
        };
        sessionStorage.setItem('game_pause_data', JSON.stringify(pauseData));
        window.location.href = 'pause.html';
    }
});

// Lắng nghe khi chuột quay trở lại (Dành cho trường hợp tab vẫn mở hoặc quay về từ link)
window.addEventListener('mouseenter', () => {
    if (window.location.href.includes('pause.html')) {
        // Nếu đang ở trang pause mà chuột vào thì quay lại trang chính (thực hiện tự động bởi browser logic hoặc link)
    }
});

// Kiểm tra resume ngay khi load trang
window.addEventListener('load', checkResumeGame);

// --- CÁC HÀM CŨ GIỮ NGUYÊN ---
function preloadVideos(prefix) {
    const videoFiles = [`movie/${prefix}wait.mp4`,`movie/${prefix}fail.mp4`,`movie/${prefix}finish.mp4`,`movie/${prefix}win.mp4`,`movie/${prefix}dance1.mp4`,`movie/${prefix}dance2.mp4`,`movie/${prefix}dance3.mp4`,`movie/${prefix}dance4.mp4`,`movie/${prefix}dance5.mp4` ];
    document.getElementById('loading-overlay').style.display = 'flex';
    const promises = videoFiles.map(url => {
        return new Promise((resolve) => {
            const v = document.createElement('video');
            v.src = url; v.preload = 'auto';
            v.oncanplaythrough = resolve; v.onerror = resolve;
            setTimeout(resolve, 3000);
        });
    });
    return Promise.all(promises);
}

async function handlePreloadThenStart() {
    await preloadVideos(charPrefix);
    document.getElementById('loading-overlay').style.display = 'none';
    startGame();
}

function loadColors() {
    ['r1','g1','b1','r2','g2','b2'].forEach(id => {
        const val = localStorage.getItem('anaglyph_' + id);
        if(val !== null) document.getElementById(id).value = val;
    });
}
loadColors();
document.querySelectorAll('input[type="range"]').forEach(sl => {
    sl.oninput = () => localStorage.setItem('anaglyph_' + sl.id, sl.value);
});

function updateLeaderboardUI() {
    const scores = JSON.parse(localStorage.getItem('vision_scores') || "[]");
    const container = document.getElementById('lb-content');
    container.innerHTML = scores.length ? "" : "<div class='lb-row' style='justify-content:center'>Chưa có dữ liệu</div>";
    scores.slice(0, 5).forEach((s, i) => {
        container.innerHTML += `<div class="lb-row"><span>#${i+1} - ${s.date}</span> <b>${s.val}</b></div>`;
    });
}
updateLeaderboardUI();

function saveFinalScore(val) {
    let scores = JSON.parse(localStorage.getItem('vision_scores') || "[]");
    scores.push({val: val, date: new Date().toLocaleDateString('vi-VN')});
    scores.sort((a,b) => b.val - a.val);
    localStorage.setItem('vision_scores', JSON.stringify(scores.slice(0, 10)));
}

document.querySelectorAll('.song').forEach(el => el.onclick = () => {
    document.querySelectorAll('.song').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
});
document.querySelectorAll('.char').forEach(el => el.onclick = () => {
    document.querySelectorAll('.char').forEach(c => c.classList.remove('active'));
    el.classList.add('active'); charPrefix = el.dataset.prefix;
});

function updateDemo() {
    document.getElementById('demo1').style.backgroundColor = `rgb(${r1.value},${g1.value},${b1.value})`;
    document.getElementById('demo2').style.backgroundColor = `rgb(${r2.value},${g2.value},${b2.value})`;
    requestAnimationFrame(updateDemo);
}
updateDemo();

function playVideo(type) {
    let fileName = (type === 'dance') ? `movie/${charPrefix}dance${Math.floor(Math.random()*5)+1}.mp4` : `movie/${charPrefix}${type}.mp4`;
    charVid.src = fileName;
    charVid.loop = (type === 'wait');
    charVid.load();
    charVid.play().catch(() => {});
}

audioMusic.onended = () => { 
    isEnding = true; sequence = []; isGameRunning = false;
    saveFinalScore(score); updateLeaderboardUI();
    document.getElementById('finalScoreDisplay').innerText = score;
    document.getElementById('result-board').style.display = 'block';
    playVideo('win'); audioClap.play();
    msg = "MISSION COMPLETE!"; msgTime = 150; 
};

charVid.onended = () => {
    if (!isEnding && (charVid.src.includes('dance') || charVid.src.includes('fail') || charVid.src.includes('finish'))) {
        if (!isPostFinishWait) playVideo('wait');
    }
};

function createExplosion() {
    const count = 60 + (level * 20);
    for(let i=0; i<count; i++) {
        particles.push({
            x: canvas.width / 2, y: canvas.height / 2,
            vx: (Math.random() - 0.5) * (12 + level), vy: (Math.random() - 0.5) * (12 + level),
            size: Math.random() * 5 + 2, color: ['#FFD700','#FF4500','#00FF00','#00BFFF','#FF00FF','#FFFFFF'][Math.floor(Math.random()*6)], life: 1.0
        });
    }
}

function startGame() {
    const userFile = document.getElementById('userAudioFile').files[0];
    if (userFile) {
        audioMusic.src = URL.createObjectURL(userFile);
        bpm = parseInt(document.getElementById('userBPM').value) || 120;
    } else {
        const activeSong = document.querySelector('.song.active');
        bpm = parseInt(activeSong.dataset.bpm);
        audioMusic.src = 'sounds/' + activeSong.dataset.file;
    }
    isEnding = false; level = 1; successCount = 0; score = 0; particles = []; 
    isPreFinish = false; isPostFinishWait = false; isGameRunning = true;
    document.getElementById('result-board').style.display = 'none';
    playVideo('wait'); audioMusic.play();
    document.getElementById('menu-layer').style.display = 'none';
    document.getElementById('game-layer').style.display = 'block';
    resize(); generateSeq();
    requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown', (e) => {
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
    if (e.key === 'Escape') { clearPauseData(); location.reload(); }
    if (isEnding || isPreFinish || isPostFinishWait) return;

    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
        if (e.key === sequence[userInput.length]?.key) userInput.push(e.key);
        else { userInput = []; audioFail.play(); playVideo('fail'); msg = "WRONG KEY"; msgTime = 30; }
    }
    if (e.key === ' ' && userInput.length === sequence.length) {
        if (fanAngle >= 90 && fanAngle <= 135) handleSuccess();
        else { audioFail.play(); playVideo('fail'); msg = "MISS TIME"; userInput = []; }
        msgTime = 40;
    }
});

function handleSuccess() {
    audioDing.currentTime = 0; audioDing.play();
    score += level * 10;
    if (sequence.length === 10) {
        playVideo('finish'); audioClap.play(); createExplosion();
        msg = "FINISH COMPLETE!"; isPostFinishWait = true; postFinishCounter = 0; sequence = []; return;
    }
    successCount++;
    if (successCount >= level) {
        if (level === 9) {
            isPreFinish = true; preFinishCounter = 0; sequence = [];
            msg = "GET READY FOR FINISH!"; msgTime = 100;
        } else {
            level++; successCount = 0;
            audioLevelUp.src = `sounds/up${level}.mp3`; audioLevelUp.play();
            createExplosion(); playVideo('dance'); msg = "LEVEL UP!"; generateSeq();
        }
    } else {
        playVideo('dance'); msg = "PERFECT!"; generateSeq();
    }
}

function generateSeq(count = level) {
    userInput = [];
    sequence = Array.from({length: count}, () => ({
        key: ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'][Math.floor(Math.random()*4)],
        type: Math.random() > 0.5 ? 1 : 2
    }));
}

function gameLoop(time) {
    const dt = time - lastTime; lastTime = time;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const scale = canvas.height / 600;
    const c1 = `rgb(${r1.value}, ${g1.value}, ${b1.value})`;
    const c2 = `rgb(${r2.value}, ${g2.value}, ${b2.value})`;

    const vidAspect = charVid.videoWidth / (charVid.videoHeight || 1);
    let drawW = canvas.width, drawH = drawW / vidAspect;
    if (drawH > canvas.height) { drawH = canvas.height; drawW = drawH * vidAspect; }
    ctx.drawImage(charVid, (canvas.width - drawW) / 2, (canvas.height - drawH) / 2, drawW, drawH);

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1.0;

    fanAngle = (fanAngle + ((bpm/120)*360 * dt/1000)) % 360;
    let currentBeat = Math.floor(fanAngle / 90);
    if (currentBeat !== lastBeat && currentBeat === 0) {
        if (isPreFinish) {
            preFinishCounter++;
            if (preFinishCounter >= 2) { isPreFinish = false; generateSeq(10); msg = "FINISH!!!"; msgTime = 40; }
        }
        if (isPostFinishWait) {
            postFinishCounter++;
            if (postFinishCounter >= 7 && postFinishCounter < 10) { msg = (10 - postFinishCounter).toString(); msgTime = 55; }
            if (postFinishCounter >= 10) {
                isPostFinishWait = false; level = 3; successCount = 0; generateSeq();
                playVideo('wait'); msg = "RESTART LEVEL 3"; msgTime = 60;
            }
        }
    }
    lastBeat = currentBeat;

    if (!isEnding) {
        const keySpacing = 65 * scale, groupGap = 120 * scale, r = 50 * scale;
        const totalWidth = (110 * scale) + groupGap + (sequence.length - 1) * keySpacing + (56 * scale);
        const cx = (canvas.width - totalWidth) / 2 + (55 * scale), baseCenterY = canvas.height - (85 * scale);
        const keysStartX = cx + (r + groupGap/2);
        ctx.beginPath(); ctx.arc(cx, baseCenterY, r, 0, Math.PI*2); ctx.strokeStyle = '#eee'; ctx.lineWidth=2; ctx.stroke();
        ctx.beginPath(); ctx.lineWidth = 12 * scale; ctx.strokeStyle = c2;
        ctx.arc(cx, baseCenterY, r + (5*scale), (Math.PI/180)*90, (Math.PI/180)*135); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, baseCenterY);
        ctx.arc(cx, baseCenterY, r, (Math.PI/180)*fanAngle, (Math.PI/180)*(fanAngle + 12));
        ctx.fillStyle = c1; ctx.fill();
        sequence.forEach((s, i) => {
            const x = keysStartX + (i * keySpacing), y = baseCenterY;
            ctx.beginPath(); ctx.arc(x, y, 28 * scale, 0, Math.PI*2);
            if (userInput.length > i) { ctx.fillStyle = '#eee'; ctx.fill(); drawBoldArrow(x, y, ARROWS[s.key], '#ccc', scale); }
            else { ctx.fillStyle = (s.type === 1 ? c1 : c2); ctx.fill(); drawBoldArrow(x, y, ARROWS[s.key], '#fff', scale); }
        });
    }

    if (msgTime > 0) {
        ctx.font = `bold ${50 * scale}px Arial`; 
        ctx.fillStyle = (msg.includes("PERFECT") || msg.includes("LEVEL") || msg.includes("COMPLETE") || isPostFinishWait) ? "#4caf50" : "#f44336";
        ctx.textAlign = "center"; ctx.fillText(msg, canvas.width/2, 100 * scale);
        msgTime--;
    }

    document.getElementById('hudStatus').innerText = `Level: ${level} | Count: ${successCount}/${level} | Score: ${score}`;
    if (document.getElementById('game-layer').style.display === 'block') requestAnimationFrame(gameLoop);
}

function drawBoldArrow(x, y, dir, color, scale) {
    ctx.strokeStyle = color; ctx.lineWidth = 10 * scale;
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    const size = 18 * scale; ctx.beginPath();
