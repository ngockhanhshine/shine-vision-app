<!DOCTYPE html>
<html lang="vi">
<head>
    <script src="../auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anaglyph Piano V2 - Shine Vision App</title>
    <script src="readme.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        
        #main-app-content { 
            display: none; 
            width: 100vw; 
            height: 100vh; 
            justify-content: center; 
            align-items: center; 
        }

        #game-container { position: relative; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { background: white; box-shadow: 0 0 30px rgba(255,255,255,0.2); height: 100vh; aspect-ratio: 9 / 16; object-fit: contain; }
        #ui-layer { position: absolute; background: white; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 90%; max-height: 90%; overflow-y: auto; z-index: 10; }
        @media (min-width: 768px) { #ui-layer { flex-direction: row; padding: 25px; gap: 30px; } }
        .column { display: flex; flex-direction: column; min-width: 280px; }
        h2 { margin-top: 0; color: #333; font-size: 18px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .song-list { height: 150px; overflow-y: auto; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 10px; }
        .song-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
        .selected { background: #ffebeb !important; color: #d32f2f; font-weight: bold; }
        .custom-upload { background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px dashed #ccc; margin-bottom: 10px; }
        .color-control { margin-bottom: 10px; padding: 10px; border: 1px solid #eee; border-radius: 8px; }
        .slider-group { display: flex; align-items: center; gap: 10px; margin: 3px 0; }
        .slider-group label { width: 15px; font-weight: bold; font-size: 11px; }
        input[type=range] { flex: 1; cursor: pointer; }
        .demo-box { height: 50px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; margin-top: 5px; border-radius: 4px; }
        .start-btn { background: #d32f2f; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        input[type=number], input[type=file] { width: 100%; margin: 5px 0; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        #readme-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 600px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 100px rgba(0,0,0,0.8); z-index: 9999; max-height: 80vh; overflow-y: auto; }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9998; }
        .pause-screen { position: absolute; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 10000; color: white; font-size: 40px; font-weight: bold; border: 5px solid #d32f2f; }
        
        .log-section { margin-top: 10px; padding: 10px; background: #f4f4f4; border-radius: 8px; border: 1px solid #ddd; }
        .log-title { font-size: 13px; font-weight: bold; color: #d32f2f; margin-bottom: 5px; border-bottom: 1px solid #ccc; }
        #log-container { max-height: 100px; overflow-y: auto; font-size: 12px; color: #333; }
        .log-item { padding: 3px 0; border-bottom: 1px dashed #ddd; }
        #back-to-menu { position: absolute; left: 50px; top: 100px; font-size: 60px; color: gray; cursor: pointer; display: none; z-index: 100; user-select: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="main-app-content">
        <div id="game-container">
            <div id="modal-overlay"></div>
            <div id="readme-modal">
                <h1>HƯỚNG DẪN SỬ DỤNG</h1>
                <div id="readme-content">Nội dung đang tải...</div>
                <button id="readme-close" style="background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px; float: right;">ĐÓNG</button>
            </div>

            <div id="ui-layer">
                <div class="column">
                    <h2>1. CHỌN BÀI HÁT</h2>
                    <div id="song-list" class="song-list"></div>
                    <h2>2. TỰ THÊM NHẠC CỦA BẠN</h2>
                    <div class="custom-upload">
                        <input type="file" id="audio-upload" accept="audio/*">
                        <label style="font-size: 12px; font-weight: bold;">Nhập BPM:</label>
                        <input type="number" id="custom-bpm" value="120" min="40" max="300">
                    </div>
                    <p style="font-size: 12px; color: #666; margin: 5px 0;">Phím: <b>F G H J</b> | Chạm | Thoát: <b>ESC</b></p>
                    
                    <div class="log-section">
                        <div class="log-title">NHẬT KÝ LUYỆN TẬP</div>
                        <div id="log-container">Chưa có dữ liệu.</div>
                    </div>

                    <button class="start-btn" onclick="handleStart()">BẮT ĐẦU CHƠI</button>
                </div>
                <div class="column">
                    <h2>3. CÂN CHỈNH ANAGLYPH</h2>
                    <div class="color-control">
                        <span style="font-weight: bold; color: #d32f2f; font-size: 13px;">KÍNH TRÁI (MÀU ĐỎ)</span>
                        <div class="slider-group"><label>R</label><input type="range" id="r1" min="0" max="255" value="255"></div>
                        <div class="slider-group"><label>G</label><input type="range" id="g1" min="0" max="255" value="200"></div>
                        <div class="slider-group"><label>B</label><input type="range" id="b1" min="0" max="255" value="0"></div>
                        <div id="demo1" class="demo-box">DEMO ĐỎ</div>
                    </div>
                    <div class="color-control">
                        <span style="font-weight: bold; color: #008b8b; font-size: 13px;">KÍNH PHẢI (MÀU XANH)</span>
                        <div class="slider-group"><label>R</label><input type="range" id="r2" min="0" max="255" value="0"></div>
                        <div class="slider-group"><label>G</label><input type="range" id="g2" min="0" max="255" value="255"></div>
                        <div class="slider-group"><label>B</label><input type="range" id="b2" min="0" max="255" value="255"></div>
                        <div id="demo2" class="demo-box">DEMO XANH</div>
                    </div>
                </div>
            </div>

            <div id="back-to-menu" onclick="exitToMenu()">←</div>
            <canvas id="gameCanvas" width="1080" height="1920"></canvas>
        </div>
    </div>

    <script>
        // --- BẢO MẬT CONSOLE (PHIÊN BẢN MOBILE-FRIENDLY) ---
        (function() {
            const check = function() {
                // Bước 1: Kiểm tra xem có phải điện thoại không
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                
                const threshold = 160;
                const widthThreshold = window.outerWidth - window.innerWidth > threshold;
                const heightThreshold = window.outerHeight - window.innerHeight > threshold;
                const devtools = { open: false };
                const element = new Image();
                
                // Bẫy Image trick (Vẫn chạy tốt trên cả Mobile và PC)
                Object.defineProperty(element, 'id', {
                    get: function() {
                        devtools.open = true;
                        terminateSession();
                    }
                });

                function terminateSession() {
                    localStorage.removeItem('user_login');
                    document.body.innerHTML = "";
                    window.location.replace("about:blank");
                }

                console.log(element);
                console.clear();

                // Bước 2: Chỉ check width/height nếu KHÔNG PHẢI mobile
                // Nếu là mobile thì chỉ check devtools.open (qua bẫy Image)
                if (!isMobile) {
                    if (widthThreshold || heightThreshold || devtools.open) {
                        terminateSession();
                    }
                } else {
                    if (devtools.open) {
                        terminateSession();
                    }
                }
            };

            // Kiểm tra bằng Debugger lag (Vẫn giữ để chặn PC)
            setInterval(function() {
                const start = performance.now();
                debugger;
                if (performance.now() - start > 100) { // Tăng lên 100ms để tránh lag ảo trên mobile
                    window.location.replace("about:blank");
                }
            }, 500); // Giảm tần suất debugger một chút để mobile mượt hơn

            setInterval(check, 500);
            window.addEventListener('resize', check);
        })();

        // --- KIỂM TRA ĐĂNG NHẬP ---
        (function() {
            const loginData = JSON.parse(localStorage.getItem('user_login'));
            if (!loginData) {
                alert("Bạn cần đăng nhập để chơi bài này!");
                window.location.href = '../index.html';
            } else {
                document.getElementById('main-app-content').style.display = 'flex';
            }
        })();

        const container = document.getElementById('game-container');
        let canvas = document.getElementById('gameCanvas');
        let ctx = canvas.getContext('2d');
        let backupNodes = null; 
        let isPaused = false; 
        let pauseTimeStart = 0; 

        window.addEventListener('beforeunload', () => {
            if (typeof gameState !== 'undefined' && gameState === 'PLAYING') saveLog();
        });

        container.addEventListener('mouseleave', () => {
            if (isPaused) return;
            isPaused = true;
            pauseTimeStart = performance.now(); 
            if (currentAudio) currentAudio.pause();
            backupNodes = Array.from(container.childNodes);
            container.innerHTML = '<div class="pause-screen">Tạm Dừng</div>';
        });

        container.addEventListener('mouseenter', () => {
            if (backupNodes && isPaused) {
                isPaused = false;
                const pauseDuration = performance.now() - pauseTimeStart;
                startTime += pauseDuration; 
                container.innerHTML = ''; 
                backupNodes.forEach(node => container.appendChild(node)); 
                canvas = document.getElementById('gameCanvas');
                ctx = canvas.getContext('2d');
                document.querySelectorAll('input[type=range]').forEach(i => i.addEventListener('input', updateUIColors));
                document.getElementById('readme-close').onclick = closeReadme;
                renderSongList();
                updateLogDisplay();
                if (gameState === 'PLAYING') {
                    document.getElementById('back-to-menu').style.display = 'block';
                    if (currentAudio) currentAudio.play();
                    requestAnimationFrame(gameLoop);
                } else {
                    document.getElementById('ui-layer').style.display = 'flex';
                }
                backupNodes = null;
            }
        });

        const WIDTH = 1080, HEIGHT = 1920, LANE_WIDTH = WIDTH / 4;
        const HIT_ZONE_Y = HEIGHT * 0.75, HIT_WINDOW = HEIGHT * 0.45, NOTE_HEIGHT = HEIGHT * 0.15;

        const SONGS = [
            {name: "Shape Of You (96 BPM)", bpm: 96, file: "sounds/Shape-Of-You.mp3"},
            {name: "Monkey Dance (98 BPM)", bpm: 98, file: "sounds/Monkey-Dance.mp3"},
            {name: "BabyShark (115 BPM)", bpm: 115, file: "sounds/BabyShark.mp3"},
            {name: "Counting Star (124 BPM)", bpm: 124, file: "sounds/Counting-Star.mp3"},
            {name: "Sugar (120 BPM)", bpm: 120, file: "sounds/Sugar.mp3"},
            {name: "Beliver (125 BPM)", bpm: 125, file: "sounds/Beliver.mp3"}
        ];

        let selectedSongIdx = 0, gameState = 'MENU', score = 0, notes = [], particles = [];
        let startTime = 0, currentAudio = null, feedbackTimer = 0, feedbackText = "";
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let dingBuffer = null, failBuffer = null;

        function saveLog() {
            if (score === 0) return;
            let logs = JSON.parse(localStorage.getItem('piano_logs') || "[]");
            let now = new Date();
            let d = String(now.getDate()).padStart(2, '0') + '/' + String(now.getMonth() + 1).padStart(2, '0');
            let duration = Math.floor((performance.now() - startTime) / 1000);
            let m = Math.floor(duration / 60);
            let s = duration % 60;
            let timeStr = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            logs.unshift({ date: d, count: logs.length + 1, score: score, duration: timeStr });
            if (logs.length > 10) logs.pop();
            localStorage.setItem('piano_logs', JSON.stringify(logs));
            updateLogDisplay();
        }

        function updateLogDisplay() {
            const logBox = document.getElementById('log-container');
            if(!logBox) return;
            let logs = JSON.parse(localStorage.getItem('piano_logs') || "[]");
            if(logs.length === 0) { logBox.innerHTML = "Chưa có dữ liệu."; return; }
            logBox.innerHTML = logs.map(l => `<div class="log-item">${l.date} - Lần ${l.count} - ${l.score}đ - ${l.duration}</div>`).join('');
        }

        function exitToMenu() {
            if (currentAudio) currentAudio.pause();
            saveLog();
            gameState = 'MENU';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('back-to-menu').style.display = 'none';
        }

        async function loadSound(url) { try { const r = await fetch(url); const ab = await r.arrayBuffer(); return await audioCtx.decodeAudioData(ab); } catch(e) { return null; } }
        async function initSounds() { dingBuffer = await loadSound('sounds/Ding.wav'); failBuffer = await loadSound('sounds/Fail.wav'); }
        
        function playSound(buffer) { 
            if (isPaused || !buffer || audioCtx.state === 'suspended') return; 
            const s = audioCtx.createBufferSource(); 
            s.buffer = buffer; 
            s.connect(audioCtx.destination); 
            s.start(0); 
        }

        class Particle {
            constructor(x, y, color) { this.x = x; this.y = y; this.color = color; this.size = Math.random() * 20 + 10; this.speedX = (Math.random() - 0.5) * 30; this.speedY = (Math.random() - 0.5) * 30; this.life = 1.0; this.decay = Math.random() * 0.05 + 0.02; }
            update() { this.x += this.speedX; this.y += this.speedY; this.life -= this.decay; }
            draw() { ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.size, this.size); ctx.globalAlpha = 1.0; }
        }
        function createExplosion(x, y, color) { for (let i = 0; i < 15; i++) particles.push(new Particle(x, y, color)); }

        let colorRed = {r:255, g:131, b:55}, colorCyan = {r:0, g:255, b:255};

        function loadSavedColors() {
            const r = localStorage.getItem('anaglyph_red'), c = localStorage.getItem('anaglyph_cyan');
            if(r) { colorRed = JSON.parse(r); document.getElementById('r1').value = colorRed.r; document.getElementById('g1').value = colorRed.g; document.getElementById('b1').value = colorRed.b; }
            if(c) { colorCyan = JSON.parse(c); document.getElementById('r2').value = colorCyan.r; document.getElementById('g2').value = colorCyan.g; document.getElementById('b2').value = colorCyan.b; }
            updateUIColors();
        }

        function updateUIColors() {
            const r1 = document.getElementById('r1'); if(!r1) return;
            colorRed = { r: r1.value, g: document.getElementById('g1').value, b: document.getElementById('b1').value };
            colorCyan = { r: document.getElementById('r2').value, g: document.getElementById('g2').value, b: document.getElementById('b2').value };
            localStorage.setItem('anaglyph_red', JSON.stringify(colorRed));
            localStorage.setItem('anaglyph_cyan', JSON.stringify(colorCyan));
            document.getElementById('demo1').style.backgroundColor = `rgb(${colorRed.r},${colorRed.g},${colorRed.b})`;
            document.getElementById('demo2').style.backgroundColor = `rgb(${colorCyan.r},${colorCyan.g},${colorCyan.b})`;
        }

        function renderSongList() {
            const list = document.getElementById('song-list'); if(!list) return;
            list.innerHTML = '';
            SONGS.forEach((song, i) => {
                const div = document.createElement('div'); div.className = `song-item ${i === selectedSongIdx ? 'selected' : ''}`;
                div.innerHTML = (i === selectedSongIdx ? "▶ " : "　") + song.name;
                div.onclick = () => { selectedSongIdx = i; document.getElementById('audio-upload').value = ""; renderSongList(); };
                list.appendChild(div);
            });
        }

        class Note {
            constructor(lane, hitTime, speed) { this.lane = lane; this.hitTime = hitTime; this.speed = speed; this.hit = false; this.y = -NOTE_HEIGHT; }
            update(currentTime) { this.y = HIT_ZONE_Y - ((this.hitTime - currentTime) * this.speed); }
            draw() {
                const c = (this.lane % 2 === 0) ? colorRed : colorCyan; ctx.fillStyle = `rgb(${c.r},${c.g},${c.b})`;
                const p = LANE_WIDTH * 0.08; ctx.fillRect(this.lane * LANE_WIDTH + p, this.y, LANE_WIDTH - p*2, NOTE_HEIGHT);
            }
        }

        async function handleStart() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const f = document.getElementById('audio-upload');
            let bpm, src;
            if (f.files.length > 0) { bpm = parseInt(document.getElementById('custom-bpm').value); src = URL.createObjectURL(f.files[0]); }
            else { const s = SONGS[selectedSongIdx]; bpm = s.bpm; src = s.file; }
            gameState = 'PLAYING'; document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('back-to-menu').style.display = 'block';
            score = 0; notes = []; particles = [];
            const beat = 60 / bpm; const spd = HIT_ZONE_Y / (beat * 2);
            for (let i = 0; i < 800; i++) notes.push(new Note(Math.floor(Math.random() * 4), 3.0 + i * beat, spd));
            currentAudio = new Audio(src); currentAudio.play(); startTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (isPaused || gameState !== 'PLAYING' || !ctx) return; 
            let currentTime = (performance.now() - startTime) / 1000;
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = "#fcfcfc"; ctx.fillRect(0, HIT_ZONE_Y - HIT_WINDOW/2, WIDTH, HIT_WINDOW);
            ctx.strokeStyle = "#eee"; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0, HIT_ZONE_Y); ctx.lineTo(WIDTH, HIT_ZONE_Y); ctx.stroke();
            for (let i = notes.length - 1; i >= 0; i--) {
                let n = notes[i]; n.update(currentTime);
                if (!n.hit) { n.draw(); if (n.y > (HIT_ZONE_Y + HIT_WINDOW / 2)) { playSound(failBuffer); notes.splice(i, 1); } }
                else notes.splice(i, 1);
            }
            if (notes.length === 0 && currentAudio && currentAudio.ended) { exitToMenu(); return; }
            for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); particles[i].draw(); if (particles[i].life <= 0) particles.splice(i, 1); }
            const chars = ['F','G','H','J']; ctx.font = `bold ${LANE_WIDTH * 0.45}px Arial`;
            chars.forEach((char, i) => {
                const c = (i % 2 === 0) ? colorRed : colorCyan; ctx.fillStyle = `rgb(${c.r},${c.g},${c.b})`;
                ctx.fillText(char, i * LANE_WIDTH + (LANE_WIDTH/2) - (ctx.measureText(char).width/2), HIT_ZONE_Y + LANE_WIDTH * 0.45);
            });
            ctx.fillStyle = "black"; ctx.font = `bold 50px Arial`; ctx.fillText(`Điểm: ${score}`, 50, 80);
            if (feedbackTimer > 0) { ctx.fillStyle = "#2e7d32"; ctx.font = "bold 80px Arial"; ctx.fillText(feedbackText, (WIDTH/2) - (ctx.measureText(feedbackText).width/2), HEIGHT * 0.25); feedbackTimer--; }
            requestAnimationFrame(gameLoop);
        }

        function checkHit(laneIdx) {
            if (gameState !== 'PLAYING' || isPaused) return;
            let hit = false;
            for (let n of notes) {
                if (n.lane === laneIdx && !n.hit && Math.abs(n.y - HIT_ZONE_Y) < HIT_WINDOW / 2) {
                    n.hit = true; hit = true; playSound(dingBuffer); score += 10; feedbackText = "CHÍNH XÁC!"; feedbackTimer = 30;
                    const c = (n.lane % 2 === 0) ? colorRed : colorCyan; createExplosion(n.lane * LANE_WIDTH + LANE_WIDTH/2, n.y + NOTE_HEIGHT/2, `rgb(${c.r},${c.g},${c.b})`);
                    break;
                }
            }
            if (!hit) playSound(failBuffer);
        }

        window.addEventListener('keydown', (e) => {
            const isConsoleKey = (
                e.key === "F12" || 
                (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "i" || e.key === "J" || e.key === "j" || e.key === "C" || e.key === "c")) ||
                (e.metaKey && e.altKey && (e.key === "I" || e.key === "i" || e.key === "J" || e.key === "j" || e.key === "C" || e.key === "c")) ||
                (e.ctrlKey && (e.key === "U" || e.key === "u")) ||
                (e.metaKey && (e.key === "U" || e.key === "u")) ||
                (e.ctrlKey && (e.key === "s" || e.key === "S"))
            );

            if (isConsoleKey) {
                e.preventDefault();
                showReadme();
                return;
            }

            if (gameState === 'PLAYING' && !isPaused) {
                if (e.key === 'Escape') { exitToMenu(); return; }
                let idx = ['f', 'g', 'h', 'j'].indexOf(e.key.toLowerCase());
                if (idx !== -1) checkHit(idx);
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            if (gameState !== 'PLAYING' || isPaused) return; e.preventDefault();
            const rect = canvas.getBoundingClientRect(); const sX = WIDTH / rect.width;
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                let idx = Math.floor(((t.clientX - rect.left) * sX) / LANE_WIDTH);
                if (idx >= 0 && idx < 4) checkHit(idx);
            }
        }, {passive: false});

        function showReadme() {
            const m = document.getElementById('readme-modal'); const o = document.getElementById('modal-overlay');
            document.getElementById('readme-content').innerHTML = (typeof readmeContent !== 'undefined') ? readmeContent : "No readme found.";
            m.style.display = 'block'; o.style.display = 'block'; if(currentAudio) currentAudio.pause();
        }
        function closeReadme() { document.getElementById('readme-modal').style.display = 'none'; document.getElementById('modal-overlay').style.display = 'none'; }
        document.getElementById('readme-close').onclick = closeReadme;

        initSounds(); loadSavedColors(); renderSongList(); updateLogDisplay();
        document.querySelectorAll('input[type=range]').forEach(i => i.addEventListener('input', updateUIColors));
    </script>
</body>
</html>
