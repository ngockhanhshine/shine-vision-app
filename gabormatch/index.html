<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shine Vision - Gabor Sound Training</title>
    <style>
        body { margin: 0; padding: 0; background-color: #7F7F7F; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; flex-direction: column; height: 100vh; }
        #game-ui { text-align: center; color: white; font-size: 18px; font-weight: bold; padding: 10px; }
        #grid-container { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; align-content: center; justify-items: center; }
        .card { background-color: #7F7F7F; border: 2px solid #999; border-radius: 12px; width: 85px; height: 85px; position: relative; cursor: pointer; display: flex; justify-content: center; align-items: center; overflow: hidden; transition: 0.2s; }
        .gabor-content { position: absolute; width: 100%; height: 100%; background: repeating-linear-gradient(var(--ang), #fff, #fff 1px, #000 var(--sz), #000 var(--sz2)); mask-image: radial-gradient(circle, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%); -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%); opacity: var(--op); }
        .card.selected { border-color: #2196F3; box-shadow: 0 0 15px #2196F3; transform: scale(1.05); z-index: 2; }
        .card.matched { opacity: 0.1; pointer-events: none; border-color: transparent; }
        #controls { background: white; padding: 15px; border-radius: 20px 20px 0 0; }
        .slider-group { display: flex; align-items: center; margin-bottom: 10px; }
        label { width: 70px; font-size: 13px; font-weight: bold; }
        input[type=range] { flex: 1; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #2196F3; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game-ui">Cặp còn lại: <span id="pairs-left">6</span></div>
    <div id="grid-container"></div>
    <div id="controls">
        <div class="slider-group"><label>Độ rõ:</label><input type="range" id="opSlider" min="10" max="100" value="80"></div>
        <div class="slider-group"><label>Cỡ sọc:</label><input type="range" id="sizeSlider" min="2" max="10" value="4"></div>
        <button id="resetBtn">🔄 ĐỔI VỊ TRÍ MỚI</button>
    </div>

    <script>
        const grid = document.getElementById('grid-container');
        const opS = document.getElementById('opSlider');
        const sizeS = document.getElementById('sizeSlider');
        
        // --- KHỞI TẠO ÂM THANH (Giống bản Anaglyph Piano của anh) ---
        const dingSound = new Audio('sounds/Ding.wav');
        const failSound = new Audio('sounds/Fail.wav');
        dingSound.preload = 'auto';
        failSound.preload = 'auto';

        let cardData = [], first = null, second = null, pairs = 6, canClick = true;

        function init() {
            grid.innerHTML = ''; cardData = []; first = null; second = null; pairs = 6; canClick = true;
            document.getElementById('pairs-left').innerText = pairs;
            let angles = ["0deg", "45deg", "90deg", "135deg", "30deg", "60deg"];
            let pool = [...angles, ...angles].sort(() => Math.random() - 0.5);

            pool.forEach((ang, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="gabor-content" style="--ang: ${ang};"></div>`;
                grid.appendChild(card);
                let data = { dom: card, ang: ang, matched: false };
                card.onclick = () => {
                    if (!canClick || data.matched || data === first) return;
                    card.classList.add('selected');
                    if (!first) { first = data; } 
                    else {
                        second = data;
                        if (first.ang === second.ang) {
                            // CHỌN ĐÚNG
                            dingSound.currentTime = 0; // Reset để phát liên tục được
                            dingSound.play();
                            first.dom.classList.replace('selected', 'matched');
                            second.dom.classList.replace('selected', 'matched');
                            first.matched = second.matched = true;
                            pairs--;
                            document.getElementById('pairs-left').innerText = pairs;
                            first = null; second = null;
                            if(pairs === 0) setTimeout(() => alert("Hoàn thành bài tập!"), 300);
                        } else {
                            // CHỌN SAI
                            canClick = false;
                            failSound.currentTime = 0;
                            failSound.play();
                            setTimeout(() => {
                                first.dom.classList.remove('selected');
                                second.dom.classList.remove('selected');
                                first = null; second = null;
                                canClick = true;
                            }, 500);
                        }
                    }
                };
                cardData.push(data);
            });
            updateStyles();
        }

        function updateStyles() {
            const op = opS.value / 100;
            const size = parseInt(sizeS.value);
            document.querySelectorAll('.gabor-content').forEach(el => {
                el.style.setProperty('--op', op);
                el.style.setProperty('--sz', size + "px");
                el.style.setProperty('--sz2', (size * 2) + "px");
            });
        }

        opS.oninput = updateStyles;
        sizeS.oninput = updateStyles;
        document.getElementById('resetBtn').onclick = init;
        init();
    </script>
</body>
</html>
