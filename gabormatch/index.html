<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shine Vision - Gabor Auto-Next</title>
    <script src="readme.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #7F7F7F; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; flex-direction: column; height: 100vh; position: relative; }
        #game-ui { text-align: center; color: white; font-size: 16px; font-weight: bold; padding: 10px; background: rgba(0,0,0,0.2); z-index: 10; }
        
        #grid-container { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; align-content: center; justify-items: center; transition: opacity 0.1s; }
        
        /* Lớp phủ bảo mật toàn màn hình */
        #pause-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #7F7F7F; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; font-weight: bold; pointer-events: none; }

        .card { background-color: #7F7F7F; border: 2px solid #999; border-radius: 12px; width: 80px; height: 80px; position: relative; cursor: pointer; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .gabor-content { position: absolute; width: 100%; height: 100%; background: repeating-linear-gradient(var(--ang), #fff, #fff 1px, #000 var(--sz), #000 var(--sz2)); mask-image: radial-gradient(circle, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%); -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%); opacity: var(--op); }
        .card.selected { border-color: #2196F3; box-shadow: 0 0 15px #2196F3; z-index: 2; }
        .card.matched { opacity: 0.1; pointer-events: none; }

        #controls-wrapper { background: white; padding: 15px; border-radius: 20px 20px 0 0; display: flex; flex-wrap: wrap; gap: 15px; max-height: 45vh; overflow-y: auto; z-index: 101; position: relative; }
        .control-section { flex: 1; min-width: 250px; }
        .journal-section { flex: 1; min-width: 250px; border-left: 1px solid #eee; padding-left: 15px; }

        .slider-group { display: flex; align-items: center; margin-bottom: 12px; gap: 8px; }
        .slider-group label { width: 60px; font-size: 12px; font-weight: bold; }
        .slider-group input { flex: 1; }
        .btn-step { width: 30px; height: 30px; border-radius: 5px; border: 1px solid #ccc; background: #f8f8f8; cursor: pointer; font-weight: bold; }

        #journal-list { font-size: 12px; list-style: none; padding: 0; margin: 0; max-height: 120px; overflow-y: auto; border: 1px solid #f0f0f0; border-radius: 5px; }
        #journal-list li { padding: 5px; border-bottom: 1px solid #eee; color: #444; }
        #journal-list li:nth-child(odd) { background: #fafafa; }

        button#resetBtn { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #2196F3; color: white; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .msg-alert { color: #d32f2f; font-size: 11px; font-weight: bold; margin-top: 5px; display: none; }

        #instruction-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; color: white; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #instruction-content { background: #fff; color: #333; padding: 20px; border-radius: 10px; max-width: 600px; margin: 40px auto; white-space: pre-wrap; font-size: 14px; line-height: 1.6; }

        @media (max-width: 600px) {
            .journal-section { border-left: none; padding-left: 0; border-top: 1px solid #eee; padding-top: 10px; }
            .card { width: 75px; height: 75px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="pause-overlay">⏸ TẠM DỪNG<br><small>Di chuyển chuột vào trang web để tiếp tục</small></div>

    <div id="game-ui">Cặp còn lại: <span id="pairs-left">6</span> | <span id="timer">00:00</span></div>
    
    <div id="grid-container"></div>
    
    <div id="controls-wrapper">
        <div class="control-section">
            <div class="slider-group">
                <label>Độ rõ:</label>
                <button class="btn-step" onclick="adjust('op', -5)">-</button>
                <input type="range" id="opSlider" min="5" max="100" value="80">
                <button class="btn-step" onclick="adjust('op', 5)">+</button>
            </div>
            <div class="slider-group">
                <label>Cỡ sọc:</label>
                <button class="btn-step" onclick="adjust('sz', -1)">-</button>
                <input type="range" id="sizeSlider" min="2" max="10" value="4">
                <button class="btn-step" onclick="adjust('sz', 1)">+</button>
            </div>
            <button id="resetBtn">🔄 VÁN MỚI / ĐỔI VỊ TRÍ</button>
            <div id="auto-msg" class="msg-alert">🔥 Tuyệt vời! Độ khó đã tự tăng.</div>
        </div>

        <div class="journal-section">
            <div style="font-size: 13px; font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between;">
                <span>NHẬT KÝ TẬP</span>
                <span style="color:red; cursor:pointer; font-size: 11px;" onclick="clearJournal()">Xóa hết</span>
            </div>
            <ul id="journal-list"></ul>
        </div>
    </div>

    <div id="instruction-modal" onclick="this.style.display='none'">
        <div id="instruction-content" onclick="event.stopPropagation()">
            <div id="readme-text"></div>
            <button onclick="document.getElementById('instruction-modal').style.display='none'" style="margin-top:20px; width:100%; padding:10px; cursor:pointer;">ĐÓNG</button>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid-container');
        const opS = document.getElementById('opSlider');
        const sizeS = document.getElementById('sizeSlider');
        const journalList = document.getElementById('journal-list');
        const timerEl = document.getElementById('timer');
        const autoMsg = document.getElementById('auto-msg');
        const pauseOverlay = document.getElementById('pause-overlay');
        
        const dingSound = new Audio('sounds/Ding.wav');
        const failSound = new Audio('sounds/Fail.wav');
        dingSound.preload = 'auto'; failSound.preload = 'auto';

        let cardData = [], first = null, second = null, pairs = 6, canClick = true;
        let startTime, timerInterval, gameRunning = false, finalTimeSec = 0;
        let elapsedBeforePause = 0;

        // --- LOAD/SAVE SETTINGS ---
        function loadSettings() {
            const savedOp = localStorage.getItem('gabor_op');
            const savedSz = localStorage.getItem('gabor_sz');
            if (savedOp) opS.value = savedOp;
            if (savedSz) sizeS.value = savedSz;
        }
        function saveSettings() {
            localStorage.setItem('gabor_op', opS.value);
            localStorage.setItem('gabor_sz', sizeS.value);
        }

        // --- BẢO MẬT DOM (TRÊN TOÀN BODY) ---
        document.body.onmouseleave = () => pauseGame();
        document.body.onmouseenter = () => resumeGame();

        function pauseGame() {
            if (gameRunning) {
                clearInterval(timerInterval);
                elapsedBeforePause = Date.now() - startTime;
            }
            grid.style.opacity = "0"; 
            pauseOverlay.style.display = "flex";
            dingSound.pause(); failSound.pause();
        }

        function resumeGame() {
            if (gameRunning) {
                startTime = Date.now() - elapsedBeforePause;
                startTimer(true);
            }
            grid.style.opacity = "1";
            pauseOverlay.style.display = "none";
        }

        function adjust(type, step) {
            const s = type === 'op' ? opS : sizeS;
            s.value = parseInt(s.value) + step;
            updateStyles();
            saveSettings();
            autoMsg.style.display = 'none';
        }

        function startTimer(isResume = false) {
            if (!isResume) {
                startTime = Date.now();
                elapsedBeforePause = 0;
            }
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                finalTimeSec = Math.floor((Date.now() - startTime) / 1000);
                let m = Math.floor(finalTimeSec / 60).toString().padStart(2, '0');
                let s = (finalTimeSec % 60).toString().padStart(2, '0');
                timerEl.innerText = `${m}:${s}`;
            }, 1000);
        }

        function saveRecord(timeStr) {
            const now = new Date();
            const dateStr = `${now.getDate()}/${now.getMonth()+1}`;
            const records = JSON.parse(localStorage.getItem('gabor_records') || '[]');
            const sessionNum = records.filter(r => r.date === dateStr).length + 1;
            
            const newRecord = { date: dateStr, session: sessionNum, op: opS.value, sz: sizeS.value, time: timeStr };
            records.unshift(newRecord);
            localStorage.setItem('gabor_records', JSON.stringify(records.slice(0, 50)));
            renderJournal();

            // LOGIC TỰ ĐỘNG TĂNG ĐỘ KHÓ
            setTimeout(() => {
                let changed = false;
                // Trường hợp đặc biệt: Đạt giới hạn độ rõ cực thấp (< 5%) và tốc độ cao (< 12s)
                if (parseInt(opS.value) <= 5 && finalTimeSec < 12) {
                    if (parseInt(sizeS.value) > 2) {
                        sizeS.value = parseInt(sizeS.value) - 1; // Giảm cỡ sọc
                        opS.value = 50; // Reset độ rõ về 50%
                        changed = true;
                    }
                } 
                // Trường hợp bình thường: Giảm dần độ rõ
                else if (finalTimeSec < 12 && parseInt(opS.value) > 5) {
                    opS.value = parseInt(opS.value) - 5;
                    changed = true;
                }

                if (changed) {
                    updateStyles();
                    saveSettings();
                    autoMsg.style.display = 'block';
                }
            }, 500);

            // TỰ ĐỘNG CHUYỂN MÀN MỚI SAU 1.5 GIÂY
            setTimeout(() => {
                autoMsg.style.display = 'none';
                init();
            }, 1500);
        }

        function renderJournal() {
            const records = JSON.parse(localStorage.getItem('gabor_records') || '[]');
            journalList.innerHTML = records.map(r => `<li>${r.date}-L${r.session}-Rõ ${r.op}%-Sọc ${r.sz}-${r.time}</li>`).join('');
        }

        function clearJournal() { if(confirm("Xóa hết nhật ký?")) { localStorage.removeItem('gabor_records'); renderJournal(); } }

        function init() {
            grid.innerHTML = ''; cardData = []; first = null; second = null; pairs = 6; canClick = true;
            document.getElementById('pairs-left').innerText = pairs;
            timerEl.innerText = "00:00";
            gameRunning = false;
            clearInterval(timerInterval);
            
            // Bảo mật ban đầu
            if (!document.hasFocus() || !document.body.matches(':hover')) {
                pauseGame();
            } else {
                grid.style.opacity = "1";
                pauseOverlay.style.display = "none";
            }

            let angles = ["0deg", "45deg", "90deg", "135deg", "30deg", "60deg"];
            let pool = [...angles, ...angles].sort(() => Math.random() - 0.5);

            pool.forEach((ang) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="gabor-content" style="--ang: ${ang};"></div>`;
                grid.appendChild(card);
                let data = { dom: card, ang: ang, matched: false };
                card.onclick = () => {
                    if (!canClick || data.matched || data === first) return;
                    if (!gameRunning) { gameRunning = true; startTimer(); autoMsg.style.display = 'none'; }
                    card.classList.add('selected');
                    if (!first) { first = data; } 
                    else {
                        second = data;
                        if (first.ang === second.ang) {
                            dingSound.currentTime = 0; dingSound.play();
                            first.dom.classList.replace('selected', 'matched');
                            second.dom.classList.replace('selected', 'matched');
                            first.matched = second.matched = true;
                            pairs--;
                            document.getElementById('pairs-left').innerText = pairs;
                            first = null; second = null;
                            if(pairs === 0) {
                                clearInterval(timerInterval);
                                saveRecord(timerEl.innerText);
                            }
                        } else {
                            canClick = false; failSound.currentTime = 0; failSound.play();
                            setTimeout(() => {
                                first.dom.classList.remove('selected');
                                second.dom.classList.remove('selected');
                                first = null; second = null; canClick = true;
                            }, 400);
                        }
                    }
                };
                cardData.push(data);
            });
            updateStyles();
        }

        function updateStyles() {
            const op = opS.value / 100;
            const size = parseInt(sizeS.value);
            document.querySelectorAll('.gabor-content').forEach(el => {
                el.style.setProperty('--op', op);
                el.style.setProperty('--sz', size + "px");
                el.style.setProperty('--sz2', (size * 2) + "px");
            });
        }

        opS.oninput = () => { updateStyles(); saveSettings(); };
        sizeS.oninput = () => { updateStyles(); saveSettings(); };
        document.getElementById('resetBtn').onclick = () => init();
        
        loadSettings();
        renderJournal();
        init();
    </script>
</body>
</html>
